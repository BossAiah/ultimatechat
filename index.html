<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Hilom · private chat</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .dark-theme {
            background: #0f0f0f;
            color: white;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .login-card {
            background: #1e1e1e;
            border-radius: 28px;
            padding: 32px 24px;
            margin: auto;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .hilom-title {
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 32px;
            color: white;
        }

        input, button {
            font-size: 1rem;
            padding: 14px 18px;
            border-radius: 30px;
            border: none;
            background: #2c2c2e;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
        }

        button {
            background: #0a84ff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { opacity: 0.8; transform: scale(0.98);}
        .secondary-btn { background: #3a3a3c; }
        .danger-btn { background: #ff3b30; }

        .chat-header {
            background: #111;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
        }
        .chat-header h2 { font-size: 1.5rem; font-weight: 600; }
        .user-badge { display: flex; gap: 12px; align-items: center; }
        .user-badge span { font-size: 0.85rem; background: #2c2c2e; padding: 6px 12px; border-radius: 30px;}

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .users-list {
            width: 100%;
            background: #0a0a0a;
            overflow-y: auto;
            padding: 8px 0;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid #2c2c2e;
            cursor: pointer;
        }
        .user-item:active { background: #1c1c1e; }
        .user-info { display: flex; flex-direction: column; gap: 4px; flex:1;}
        .username { font-weight: 500; font-size: 1rem; }
        .status { font-size: 0.7rem; color: #8e8e93; }
        .status.online { color: #30d158; }
        .badge-admin { background: #ff9f0a; padding: 2px 8px; border-radius: 30px; font-size: 0.65rem;}

        .chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f0f0f;
            z-index: 20;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
        }
        .chat-panel.open {
            transform: translateX(0%);
        }
        .chat-panel-header {
            padding: 14px 16px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2c2c2e;
        }
        .back-btn {
            background: none;
            width: auto;
            font-size: 1.4rem;
            padding: 0;
            margin: 0;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            background: #1c1c1e;
            align-self: flex-start;
            word-wrap: break-word;
        }
        .my-message {
            align-self: flex-end;
            background: #0a84ff;
        }
        .typing-indicator {
            font-size: 0.7rem;
            color: #8e8e93;
            margin: 4px 12px;
            font-style: italic;
        }
        .chat-input-area {
            padding: 12px;
            background: #111;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #2c2c2e;
        }
        .chat-input-area input {
            flex: 1;
            margin: 0;
            background: #2c2c2e;
            border-radius: 30px;
        }
        .emoji-btn {
            background: none;
            width: auto;
            font-size: 1.6rem;
            padding: 8px;
            margin: 0;
        }
        .admin-tools {
            background: #1c1c1e;
            padding: 12px;
            margin: 8px;
            border-radius: 24px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="loading">Loading Hilom...</div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
        authDomain: "chatapp-1dabd.firebaseapp.com",
        projectId: "chatapp-1dabd",
        storageBucket: "chatapp-1dabd.firebasestorage.app",
        messagingSenderId: "203806709864",
        appId: "1:203806709864:web:f739450e99bcb5964043dd",
        measurementId: "G-YE19PXXBEZ"
    };
    
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    let currentUser = null;
    let activeChatWith = null;
    let unsubscribeMessages = null;
    let typingTimeout = null;

    // Helper functions
    function getTimestamp() {
        return firebase.firestore.FieldValue.serverTimestamp();
    }

    function escapeHtml(str) { 
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        });
    }

    // Create default users if they don't exist
    async function createDefaultUsers() {
        const defaultUsers = [
            { username: "User27", password: "thewayyou", isAdmin: false },
            { username: "User09", password: "thewayyou", isAdmin: false },
            { username: "admin", password: "181818", isAdmin: true }
        ];

        for (const user of defaultUsers) {
            try {
                // Check if user exists in Firestore
                const userQuery = await db.collection("users").where("username", "==", user.username).get();
                
                if (userQuery.empty) {
                    // User doesn't exist - create them
                    const email = `${user.username}@hilom.local`;
                    try {
                        // Try to create auth user
                        const userCred = await auth.createUserWithEmailAndPassword(email, user.password);
                        const uid = userCred.user.uid;
                        
                        // Store in Firestore
                        await db.collection("users").doc(uid).set({
                            username: user.username,
                            isAdmin: user.isAdmin,
                            createdAt: getTimestamp(),
                            lastActive: getTimestamp(),
                            online: false
                        });
                        console.log(`Created user: ${user.username}`);
                    } catch (authError) {
                        if (authError.code === 'auth/email-already-in-use') {
                            // Auth exists but Firestore doesn't - link them
                            const signInCred = await auth.signInWithEmailAndPassword(email, user.password);
                            const uid = signInCred.user.uid;
                            await db.collection("users").doc(uid).set({
                                username: user.username,
                                isAdmin: user.isAdmin,
                                createdAt: getTimestamp(),
                                lastActive: getTimestamp(),
                                online: false
                            }, { merge: true });
                            await auth.signOut();
                            console.log(`Linked existing auth to Firestore: ${user.username}`);
                        } else {
                            console.error(`Auth error for ${user.username}:`, authError);
                        }
                    }
                } else {
                    // User exists in Firestore, ensure auth exists too
                    const email = `${user.username}@hilom.local`;
                    const userDoc = userQuery.docs[0];
                    try {
                        await auth.signInWithEmailAndPassword(email, user.password);
                        await auth.signOut();
                    } catch (authError) {
                        // Auth doesn't exist - create it
                        if (authError.code === 'auth/user-not-found') {
                            const userCred = await auth.createUserWithEmailAndPassword(email, user.password);
                            await db.collection("users").doc(userCred.user.uid).set({
                                username: user.username,
                                isAdmin: user.isAdmin,
                                lastActive: getTimestamp()
                            }, { merge: true });
                        }
                    }
                }
            } catch (error) {
                console.error(`Error creating user ${user.username}:`, error);
            }
        }
    }

    // Login function
    async function loginWithUsername(username, password) {
        const usersSnap = await db.collection("users").where("username", "==", username).get();
        if (usersSnap.empty) {
            throw new Error("User not found. Please create an account.");
        }
        
        const userDoc = usersSnap.docs[0];
        const userData = userDoc.data();
        const email = `${username}@hilom.local`;
        
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            await db.collection("users").doc(cred.user.uid).update({ 
                lastActive: getTimestamp(), 
                online: true 
            });
            return { 
                uid: cred.user.uid, 
                username: userData.username, 
                isAdmin: userData.isAdmin || false 
            };
        } catch(err) {
            if (err.code === 'auth/user-not-found') {
                throw new Error("Invalid credentials. Please check your password or create an account.");
            }
            throw new Error("Login failed: " + err.message);
        }
    }

    // Register new account
    async function registerNewAccount(username, password) {
        if (username.length < 3) throw new Error("Username must be at least 3 characters");
        if (password.length < 4) throw new Error("Password must be at least 4 characters");
        
        const existing = await db.collection("users").where("username", "==", username).get();
        if (!existing.empty) throw new Error("Username already taken");
        
        const email = `${username}@hilom.local`;
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const uid = cred.user.uid;
        
        await db.collection("users").doc(uid).set({
            username: username,
            isAdmin: false,
            createdAt: getTimestamp(),
            lastActive: getTimestamp(),
            online: true
        });
        
        return { uid, username, isAdmin: false };
    }

    // Delete own account
    async function deleteMyAccount() {
        if (!currentUser) return;
        if (confirm("⚠️ Delete your account permanently? This action cannot be undone.")) {
            const userRef = db.collection("users").doc(currentUser.uid);
            await userRef.delete();
            if (auth.currentUser) {
                await auth.currentUser.delete();
            }
            logout();
        }
    }

    function logout() {
        if (unsubscribeMessages) unsubscribeMessages();
        if (currentUser) {
            db.collection("users").doc(currentUser.uid).update({ online: false }).catch(()=>{});
        }
        auth.signOut();
        currentUser = null;
        activeChatWith = null;
        renderLogin();
    }

    // Update presence
    function updatePresence() {
        if (!currentUser) return;
        const userRef = db.collection("users").doc(currentUser.uid);
        userRef.update({ lastActive: getTimestamp(), online: true }).catch(e=>console.warn);
        
        const interval = setInterval(() => {
            if (currentUser) {
                userRef.update({ lastActive: getTimestamp(), online: true }).catch(()=>{});
            } else {
                clearInterval(interval);
            }
        }, 20000);
        
        window.addEventListener("beforeunload", () => {
            if(currentUser) userRef.update({ online: false }).catch(()=>{});
        });
    }

    // Generate chat ID
    function generateChatId(uid1, uid2) {
        return uid1 < uid2 ? uid1 + "_" + uid2 : uid2 + "_" + uid1;
    }

    // Send message
    async function sendMessageTo(receiverUid) {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text || !currentUser) return;
        
        const chatId = generateChatId(currentUser.uid, receiverUid);
        const message = {
            from: currentUser.uid,
            to: receiverUid,
            text: text,
            timestamp: getTimestamp(),
            read: false
        };
        
        const msgRef = await db.collection("chats").doc(chatId).collection("messages").add(message);
        
        // Delete after 3 minutes
        setTimeout(async () => {
            try {
                await msgRef.delete();
            } catch(e) {}
        }, 180000);
        
        input.value = '';
    }

    // Subscribe to messages
    function subscribeToMessages(otherUid, otherUsername) {
        const chatId = generateChatId(currentUser.uid, otherUid);
        const messagesRef = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc");
        
        unsubscribeMessages = messagesRef.onSnapshot(snapshot => {
            const container = document.getElementById("messagesArea");
            if(!container) return;
            
            let html = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isMine = msg.from === currentUser.uid;
                html += `<div class="message-bubble ${isMine ? 'my-message' : ''}">
                            ${escapeHtml(msg.text)}
                            <div style="font-size:9px; opacity:0.6; margin-top:4px;">
                                ${msg.timestamp?.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'Just now'}
                            </div>
                         </div>`;
                
                if(!isMine && !msg.read) {
                    doc.ref.update({ read: true }).catch(()=>{});
                }
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    // Handle typing
    function handleTyping(otherUid) {
        if(!currentUser) return;
        const chatId = generateChatId(currentUser.uid, otherUid);
        const typingRef = db.collection("typing").doc(chatId);
        typingRef.set({ [currentUser.uid]: true, updated: getTimestamp() }, { merge: true });
        
        if(typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            typingRef.update({ [currentUser.uid]: false });
        }, 1500);
    }

    // Subscribe to typing
    function subscribeTyping(otherUid) {
        const chatId = generateChatId(currentUser.uid, otherUid);
        db.collection("typing").doc(chatId).onSnapshot(docSnap => {
            const typingSpan = document.getElementById("chatTypingStatus");
            if(!typingSpan) return;
            if(docSnap.exists && docSnap.data()[otherUid] === true) {
                typingSpan.innerText = "typing...";
            } else {
                typingSpan.innerText = "";
            }
        });
    }

    // Open chat panel
    function openChat(targetUid, targetUsername) {
        if(activeChatWith === targetUid) return;
        if(unsubscribeMessages) unsubscribeMessages();
        activeChatWith = targetUid;
        
        const mainDiv = document.querySelector('.main-layout');
        const adminTools = document.querySelector('.admin-tools');
        
        const panelHtml = `
            <div class="chat-panel open" id="chatPanel">
                <div class="chat-panel-header">
                    <button class="back-btn" id="closeChatBtn"><i class="fas fa-arrow-left"></i></button>
                    <div><strong>${escapeHtml(targetUsername)}</strong> <span id="chatTypingStatus" style="font-size:12px; margin-left:8px;"></span></div>
                    <div style="flex:1"></div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="chat-input-area">
                    <button id="emojiBtnChat" class="emoji-btn">😊</button>
                    <input type="text" id="chatInput" placeholder="Message..." autocomplete="off">
                    <button id="sendMsgBtn">Send</button>
                </div>
            </div>
        `;
        
        const existingPanel = document.getElementById('chatPanel');
        if(existingPanel) existingPanel.remove();
        document.getElementById("app").insertAdjacentHTML('beforeend', panelHtml);
        if(mainDiv) mainDiv.style.opacity = '0.3';
        if(adminTools) adminTools.style.display = 'none';
        
        document.getElementById('closeChatBtn').addEventListener('click', () => {
            if(unsubscribeMessages) unsubscribeMessages();
            activeChatWith = null;
            const panel = document.getElementById('chatPanel');
            if(panel) panel.remove();
            if(mainDiv) mainDiv.style.opacity = '1';
            if(adminTools) adminTools.style.display = 'block';
        });
        
        const inputField = document.getElementById('chatInput');
        document.getElementById('sendMsgBtn').addEventListener('click', () => sendMessageTo(targetUid));
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessageTo(targetUid); });
        inputField.addEventListener('input', () => handleTyping(targetUid));
        
        document.getElementById('emojiBtnChat').addEventListener('click', () => {
            const emojis = ['😀','😂','😍','🥲','😎','😢','🔥','❤️','👍','🎉','💀','✨','⭐','🌙','🌸'];
            const pick = prompt("Choose emoji:\n" + emojis.join(' '), "😀");
            if(pick && pick.trim()) inputField.value += pick;
        });
        
        subscribeToMessages(targetUid, targetUsername);
        subscribeTyping(targetUid);
    }

    // Load user list
    function loadUserList() {
        db.collection("users").onSnapshot(snapshot => {
            const users = [];
            snapshot.forEach(doc => {
                if(doc.id !== currentUser?.uid) {
                    const data = doc.data();
                    users.push({ 
                        uid: doc.id, 
                        username: data.username, 
                        isAdmin: data.isAdmin, 
                        lastActive: data.lastActive?.toDate?.() || new Date(0), 
                        online: data.online 
                    });
                }
            });
            
            users.sort((a,b) => (b.online?1:0) - (a.online?1:0));
            const container = document.getElementById("usersListContainer");
            if(!container) return;
            
            if(users.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">No other users yet</div>';
                return;
            }
            
            container.innerHTML = users.map(user => {
                let statusText = user.online ? "● Online now" : "○ Offline";
                if(!user.online && user.lastActive && user.lastActive.getTime() > 0) {
                    const minsAgo = Math.floor((Date.now() - user.lastActive) / 60000);
                    statusText = minsAgo < 60 ? `${minsAgo} min ago` : "inactive";
                }
                return `
                    <div class="user-item" data-uid="${user.uid}" data-username="${escapeHtml(user.username)}">
                        <div class="user-info">
                            <div class="username">${escapeHtml(user.username)} ${user.isAdmin ? '<span class="badge-admin">admin</span>' : ''}</div>
                            <div class="status ${user.online ? 'online' : ''}">${statusText}</div>
                        </div>
                        <i class="fas fa-comment" style="color:#0a84ff; font-size:1.2rem;"></i>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const uid = el.dataset.uid;
                    const uname = el.dataset.username;
                    openChat(uid, uname);
                });
            });
        });
    }

    // Admin functions
    async function addUserByAdmin() {
        const newUser = prompt("Enter new username:");
        if(!newUser) return;
        const pass = prompt("Enter password:");
        if(!pass) return;
        try {
            await registerNewAccount(newUser, pass);
            alert(`User "${newUser}" created successfully!`);
        } catch(e){ 
            alert("Error: " + e.message);
        }
    }
    
    async function removeUserByAdmin() {
        const username = prompt("Enter username to remove:");
        const snap = await db.collection("users").where("username","==",username).get();
        if(snap.empty){ alert("User not found"); return; }
        const doc = snap.docs[0];
        if(doc.id === currentUser.uid) { alert("Cannot delete yourself"); return; }
        
        if(confirm(`Delete user "${username}" permanently?`)) {
            await db.collection("users").doc(doc.id).delete();
            alert("User deleted");
        }
    }
    
    async function resetUserPassword() {
        const username = prompt("Username to reset password:");
        const newPass = prompt("New password:");
        if(!newPass || newPass.length < 4) { alert("Password must be at least 4 characters"); return; }
        
        const snap = await db.collection("users").where("username","==",username).get();
        if(snap.empty){ alert("User not found"); return; }
        
        alert("Password reset: Use the 'Forgot password' flow or re-create the user. For demo, delete and recreate the user.");
    }
    
    async function deleteAllChats() {
        if(confirm("⚠️ DELETE ALL PRIVATE MESSAGES? This is permanent!")){
            const chats = await db.collection("chats").get();
            for(const chatDoc of chats.docs){
                const messages = await db.collection("chats").doc(chatDoc.id).collection("messages").get();
                for(const msgDoc of messages.docs){
                    await msgDoc.ref.delete();
                }
                await chatDoc.ref.delete();
            }
            alert("All chats cleared");
        }
    }
    
    function attachAdminEvents() {
        document.getElementById("addUserBtn")?.addEventListener("click", addUserByAdmin);
        document.getElementById("removeUserBtn")?.addEventListener("click", removeUserByAdmin);
        document.getElementById("resetPassBtn")?.addEventListener("click", resetUserPassword);
        document.getElementById("deleteAllChatsBtn")?.addEventListener("click", deleteAllChats);
        document.getElementById("deleteAccountBtn")?.addEventListener("click", deleteMyAccount);
    }

    // Render dashboard
    async function renderDashboard() {
        document.getElementById("app").innerHTML = `
            <div class="dark-theme" style="display:flex; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <h2>Hilom</h2>
                    <div class="user-badge">
                        <span>${escapeHtml(currentUser.username)} ${currentUser.isAdmin ? '👑' : ''}</span>
                        <button id="logoutBtn" class="secondary-btn" style="width:auto; padding:6px 12px;">Exit</button>
                    </div>
                </div>
                <div class="main-layout">
                    <div class="users-list" id="usersListContainer">
                        <div style="padding:16px; text-align:center;">Loading users...</div>
                    </div>
                </div>
                ${currentUser.isAdmin ? `
                <div class="admin-tools" id="adminPanel">
                    <div class="flex-row">
                        <button id="addUserBtn">➕ Add User</button>
                        <button id="removeUserBtn">❌ Remove User</button>
                        <button id="resetPassBtn">🔐 Reset PW</button>
                        <button id="deleteAllChatsBtn">🗑️ Delete all chats</button>
                    </div>
                </div>` : `
                <div class="admin-tools" style="background:#1c1c1e;">
                    <button id="deleteAccountBtn" class="danger-btn" style="background:#ff3b30;">Delete My Account</button>
                </div>`}
                <div style="padding:8px; text-align:center; font-size:11px; color:#555;">tap a user → private chat</div>
            </div>
        `;
        
        document.getElementById("logoutBtn").addEventListener("click", logout);
        if(currentUser.isAdmin) attachAdminEvents();
        if(!currentUser.isAdmin) {
            document.getElementById("deleteAccountBtn")?.addEventListener("click", deleteMyAccount);
        }
        
        loadUserList();
        updatePresence();
    }

    // Render login screen
    function renderLogin() {
        document.getElementById("app").innerHTML = `
            <div class="screen">
                <div class="login-card">
                    <div class="hilom-title">Hilom</div>
                    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button id="loginBtn">Log in</button>
                    <button id="signupBtn" class="secondary-btn">Create new account</button>
                    <div style="text-align:center; margin-top:16px; font-size:12px; color:#666;">
                        Default: User27 / thewayyou<br>
                        Admin: admin / 181818
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById("loginBtn").onclick = async () => {
            const un = document.getElementById("loginUsername").value.trim();
            const pw = document.getElementById("loginPassword").value;
            if(!un || !pw) { alert("Enter username and password"); return; }
            try {
                const user = await loginWithUsername(un, pw);
                currentUser = user;
                await renderDashboard();
            } catch(e){ 
                alert("❌ " + e.message);
            }
        };
        
        document.getElementById("signupBtn").onclick = async () => {
            const un = prompt("Choose username (min 3 chars):");
            if(!un) return;
            const pw = prompt("Choose password (min 4 chars):");
            if(!pw) return;
            try {
                const newUsr = await registerNewAccount(un, pw);
                currentUser = newUsr;
                await renderDashboard();
            } catch(e){ 
                alert("❌ " + e.message);
            }
        };
    }

    // Initialize app
    async function init() {
        await createDefaultUsers();
        
        auth.onAuthStateChanged(async (user) => {
            if(user){
                const docSnap = await db.collection("users").doc(user.uid).get();
                if(docSnap.exists){
                    const data = docSnap.data();
                    currentUser = { 
                        uid: user.uid, 
                        username: data.username, 
                        isAdmin: data.isAdmin || false 
                    };
                    renderDashboard();
                } else {
                    renderLogin();
                }
            } else {
                renderLogin();
            }
        });
    }
    
    init();
</script>
</body>
