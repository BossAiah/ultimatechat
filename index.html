<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Circle Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

#login, #chat, #admin {
  display:none;
  height:100vh;
}

.center {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100%;
}

input, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button {
  background:#1f1f1f;
  color:white;
  cursor:pointer;
}

#chatBox {
  height:80vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  max-width:60%;
}

.me {
  background:#2563eb;
  margin-left:auto;
}

.other {
  background:#333;
}

#inputArea {
  display:flex;
  padding:10px;
}

#inputArea input {
  flex:1;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>Circle Chat</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type message... 😊">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="center">
  <h2>Admin Panel</h2>
  <input id="newUser1" placeholder="User27 name">
  <input id="newUser2" placeholder="User09 name">
  <input id="newPass" placeholder="New Password">
  <button onclick="updateUsers()">Update</button>
  <button onclick="logout()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
  authDomain: "chatapp-1dabd.firebaseapp.com",
  projectId: "chatapp-1dabd",
  storageBucket: "chatapp-1dabd.firebasestorage.app",
  messagingSenderId: "203806709864",
  appId: "1:203806709864:web:f739450e99bcb5964043dd",
  measurementId: "G-YE19PXXBEZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

// DEFAULT USERS (hidden)
let users = {
  user1: "User27",
  user2: "User09",
  password: "thewayyou"
};

// LOAD CUSTOM USERS
async function loadUsers(){
  const ref = doc(db,"config","users");
  const snap = await getDoc(ref);
  if(snap.exists()){
    users = snap.data();
  }
}
await loadUsers();

// LOGIN
window.login = function(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if(p === users.password && (u === users.user1 || u === users.user2)){
    currentUser = u;
    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";
    loadMessages();
  }
  else if(u === "admin" && p === "admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("admin").style.display="flex";
  }
  else{
    alert("Invalid login");
  }
}

// SEND MESSAGE
window.sendMsg = async function(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  await addDoc(collection(db,"messages"),{
    text: msg,
    user: currentUser,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}

// LOAD MESSAGES REALTIME
function loadMessages(){
  const chatBox = document.getElementById("chatBox");

  onSnapshot(collection(db,"messages"),(snapshot)=>{
    chatBox.innerHTML="";

    snapshot.forEach(docSnap=>{
      const data = docSnap.data();

      // AUTO DELETE AFTER 2 MIN
      if(Date.now() - data.time > 120000){
        deleteDoc(doc(db,"messages",docSnap.id));
        return;
      }

      const div = document.createElement("div");
      div.className = "msg " + (data.user === currentUser ? "me":"other");
      div.innerText = data.user + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// ADMIN UPDATE
window.updateUsers = async function(){
  const u1 = document.getElementById("newUser1").value;
  const u2 = document.getElementById("newUser2").value;
  const p = document.getElementById("newPass").value;

  if(!u1 || !u2 || !p) return alert("Fill all");

  await setDoc(doc(db,"config","users"),{
    user1:u1,
    user2:u2,
    password:p
  });

  alert("Updated!");
}

// LOGOUT
window.logout = function(){
  location.reload();
}

// START
document.getElementById("login").style.display="flex";

</script>
</body>
</html>
