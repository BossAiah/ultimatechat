<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Simple Chat · Messenger</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Phone-like container */
        .phone {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* Screens */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* Login Card */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #f0f2f5 0%, #e4e9f0 100%);
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            color: #0084ff;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 16px;
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #0084ff;
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #718096;
            margin-top: 20px;
        }

        /* Header */
        .header {
            background: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9ecef;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
            background: #eef2f7;
            padding: 6px 14px;
            border-radius: 30px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Users List */
        .users-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .section-header {
            padding: 12px 18px 6px;
            font-size: 13px;
            color: #6c757d;
            font-weight: 500;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #edf2f7;
        }

        .user-item:active {
            background: #e9ecef;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: #0084ff15;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #0084ff;
        }

        .user-details {
            flex: 1;
        }

        .user-fullname {
            font-weight: 600;
            font-size: 16px;
        }

        .online-badge {
            font-size: 12px;
            color: #38a169;
        }

        /* Chat View */
        .chat-header {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-title {
            flex: 1;
            font-weight: 600;
            font-size: 17px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8f9fc;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 22px;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message-sent {
            align-self: flex-end;
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            align-self: flex-start;
            background: white;
            color: #1a202c;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            background: white;
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e9ecef;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            background: #f8fafc;
        }

        .send-btn {
            background: #0084ff;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* Admin Panel (Simple Drawer) */
        .admin-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 28px 28px 0 0;
            max-height: 80%;
            overflow-y: auto;
            z-index: 1000;
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        .admin-panel.hidden {
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .admin-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .admin-user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .delete-user-btn, .delete-chat-btn {
            background: #e53e3e;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .close-admin {
            width: 100%;
            margin-top: 20px;
            background: #cbd5e0;
        }

        .empty-state {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
        }
    </style>
</head>
<body>
<div class="phone" id="app">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <div class="login-card">
                <div class="logo">💬 Messenger</div>
                <input type="text" id="loginUser" class="input-field" placeholder="Username" autocomplete="off">
                <input type="password" id="loginPass" class="input-field" placeholder="Password">
                <button id="loginBtn" class="login-btn">Sign In / Sign Up</button>
                <div id="loginErrorMsg" class="error-msg"></div>
                <div class="info-text">New? Just enter any username + password (min 6 chars)</div>
                <div class="info-text" style="margin-top:8px;">Demo: User27 / thewayyou | admin / 181818</div>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Users List) -->
    <div id="dashboardScreen" class="screen hidden">
        <div class="header">
            <button id="adminBtn" class="icon-btn">⚙️</button>
            <span class="user-name" id="currentUserLabel">User</span>
            <button id="logoutBtn" class="icon-btn">🚪</button>
        </div>
        <div class="users-container">
            <div class="section-header">✨ Active People</div>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chatScreen" class="screen hidden">
        <div class="chat-header">
            <button id="backBtn" class="back-btn">←</button>
            <div class="chat-title" id="chatPartnerName">Chat</div>
            <div style="width:40px;"></div>
        </div>
        <div id="messagesContainer" class="messages-area"></div>
        <div class="input-area">
            <input type="text" id="chatInput" class="message-input" placeholder="Type a message...">
            <button id="sendChatBtn" class="send-btn">📤</button>
        </div>
    </div>

    <!-- ADMIN DRAWER -->
    <div id="adminOverlay" class="overlay hidden"></div>
    <div id="adminDrawer" class="admin-panel hidden">
        <div class="admin-title">👑 Admin Control</div>
        <div id="adminUsersContainer"></div>
        <div style="margin-top: 20px;"><strong>🗑️ All Conversations</strong></div>
        <div id="adminChatsContainer"></div>
        <button id="closeAdminBtn" class="login-btn close-admin" style="background:#a0aec0;">Close</button>
    </div>
</div>

<script>
    // ---------- FIREBASE INIT ----------
    const firebaseConfig = {
        apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
        authDomain: "chatapp-1dabd.firebaseapp.com",
        projectId: "chatapp-1dabd",
        storageBucket: "chatapp-1dabd.firebasestorage.app",
        messagingSenderId: "203806709864",
        appId: "1:203806709864:web:f739450e99bcb5964043dd"
    };
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ---------- GLOBAL STATE ----------
    let currentUser = null;           // { username, isAdmin }
    let currentChatWith = null;       // username of person we are chatting with
    let currentMessagesRef = null;    // Firebase reference for current chat
    let messageTimeouts = new Map();   // store timeouts for auto-delete

    // Helper: sanitize for firebase keys
    function sanitize(str) {
        return str.replace(/[.#$\[\]]/g, '_');
    }

    // Generate unique chat room ID (sorted usernames)
    function getChatRoomId(user1, user2) {
        let a = sanitize(user1), b = sanitize(user2);
        return a < b ? `${a}_${b}` : `${b}_${a}`;
    }

    // ---------- AUTH & USER MANAGEMENT ----------
    async function createOrLoginUser(username, password) {
        const userRef = db.ref(`users/${sanitize(username)}`);
        const snapshot = await userRef.once('value');
        
        if (snapshot.exists()) {
            // User exists, verify password
            const userData = snapshot.val();
            if (userData.password === password) {
                return { username, isAdmin: userData.isAdmin === true };
            } else {
                throw new Error("Wrong password");
            }
        } else {
            // New user: create account (min 6 chars password)
            if (password.length < 6) throw new Error("Password must be at least 6 characters");
            const isAdmin = (username === 'admin');
            await userRef.set({
                username: username,
                password: password,
                isAdmin: isAdmin,
                online: true,
                createdAt: Date.now()
            });
            return { username, isAdmin };
        }
    }

    // Set online status
    function setOnlineStatus(username, isOnline) {
        if (!username) return;
        const userRef = db.ref(`users/${sanitize(username)}`);
        userRef.update({ online: isOnline, lastSeen: Date.now() });
        if (isOnline) {
            userRef.onDisconnect().update({ online: false, lastSeen: Date.now() });
        }
    }

    // Load all online users (excluding current user)
    function loadActiveUsers() {
        if (!currentUser) return;
        const usersRef = db.ref('users');
        usersRef.off(); // remove old listener
        usersRef.on('value', (snapshot) => {
            const users = snapshot.val();
            const activeList = [];
            for (let key in users) {
                const u = users[key];
                if (u && u.username && u.username !== currentUser.username && u.online === true) {
                    activeList.push({ username: u.username });
                }
            }
            renderUsersList(activeList);
        });
    }

    function renderUsersList(users) {
        const container = document.getElementById('usersList');
        if (!container) return;
        if (users.length === 0) {
            container.innerHTML = '<div class="empty-state">No active users online</div>';
            return;
        }
        container.innerHTML = users.map(u => `
            <div class="user-item" data-user="${u.username}">
                <div class="avatar">${u.username.charAt(0).toUpperCase()}</div>
                <div class="user-details">
                    <div class="user-fullname">${escapeHtml(u.username)}</div>
                    <div class="online-badge">● Online</div>
                </div>
            </div>
        `).join('');
        
        // Add click listeners
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => {
                const partner = el.getAttribute('data-user');
                openChatWith(partner);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- CHAT FUNCTIONALITY ----------
    function openChatWith(partnerUsername) {
        if (!currentUser) return;
        // Cleanup previous listener
        if (currentMessagesRef) {
            currentMessagesRef.off();
        }
        // Clear any pending auto-delete timeouts
        messageTimeouts.forEach(timeout => clearTimeout(timeout));
        messageTimeouts.clear();
        
        currentChatWith = partnerUsername;
        const roomId = getChatRoomId(currentUser.username, partnerUsername);
        const messagesRef = db.ref(`chats/${roomId}/messages`);
        currentMessagesRef = messagesRef;
        
        // Switch UI
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        document.getElementById('chatPartnerName').innerText = partnerUsername;
        
        // Load messages realtime
        messagesRef.on('value', (snapshot) => {
            const messages = snapshot.val();
            renderMessages(messages);
            // Schedule auto-delete for any new messages that are not yet expired
            if (messages) {
                const now = Date.now();
                Object.keys(messages).forEach(msgId => {
                    const msg = messages[msgId];
                    if (msg && msg.timestamp && !msg._deleted) {
                        const age = now - msg.timestamp;
                        if (age >= 120000) {
                            // already expired, delete now
                            messagesRef.child(msgId).remove();
                        } else {
                            const remaining = 120000 - age;
                            if (!messageTimeouts.has(msgId)) {
                                const tid = setTimeout(() => {
                                    messagesRef.child(msgId).remove();
                                    messageTimeouts.delete(msgId);
                                }, remaining);
                                messageTimeouts.set(msgId, tid);
                            }
                        }
                    }
                });
            }
            scrollToBottom();
        });
    }

    function renderMessages(messagesObj) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (!messagesObj) {
            container.innerHTML = '<div class="empty-state">✨ No messages yet. Say hi!</div>';
            return;
        }
        const messagesList = Object.keys(messagesObj).map(key => ({ id: key, ...messagesObj[key] }));
        messagesList.sort((a,b) => a.timestamp - b.timestamp);
        
        if (messagesList.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ No messages yet. Say hi!</div>';
            return;
        }
        
        container.innerHTML = messagesList.map(msg => {
            const isSent = msg.sender === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="message ${isSent ? 'message-sent' : 'message-received'}">
                    <div>${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
        }).join('');
    }

    async function sendMessage(text) {
        if (!text.trim()) return;
        if (!currentChatWith) return;
        const roomId = getChatRoomId(currentUser.username, currentChatWith);
        const messagesRef = db.ref(`chats/${roomId}/messages`);
        const newMsgRef = messagesRef.push();
        const messageData = {
            text: text.trim(),
            sender: currentUser.username,
            receiver: currentChatWith,
            timestamp: Date.now()
        };
        await newMsgRef.set(messageData);
        
        // Auto-delete after 2 minutes (120000 ms)
        const msgId = newMsgRef.key;
        const timeoutId = setTimeout(async () => {
            await newMsgRef.remove();
            messageTimeouts.delete(msgId);
        }, 120000);
        messageTimeouts.set(msgId, timeoutId);
        
        document.getElementById('chatInput').value = '';
        scrollToBottom();
    }

    function scrollToBottom() {
        const container = document.getElementById('messagesContainer');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    }

    function backToDashboard() {
        if (currentMessagesRef) {
            currentMessagesRef.off();
            currentMessagesRef = null;
        }
        messageTimeouts.forEach(tid => clearTimeout(tid));
        messageTimeouts.clear();
        currentChatWith = null;
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        loadActiveUsers(); // refresh active list
    }

    // ---------- ADMIN FUNCTIONS ----------
    async function adminDeleteUser(targetUsername) {
        if (!currentUser?.isAdmin) return;
        if (targetUsername === currentUser.username) {
            alert("Cannot delete yourself");
            return;
        }
        // Delete user from users node
        await db.ref(`users/${sanitize(targetUsername)}`).remove();
        // Delete all chat rooms that involve this user
        const chatsRef = db.ref('chats');
        const snapshot = await chatsRef.once('value');
        const chats = snapshot.val();
        if (chats) {
            for (let chatId in chats) {
                if (chatId.includes(sanitize(targetUsername))) {
                    await chatsRef.child(chatId).remove();
                }
            }
        }
        alert(`User "${targetUsername}" deleted.`);
        if (currentChatWith === targetUsername) backToDashboard();
        loadAdminPanel(); // refresh admin view
        loadActiveUsers(); // refresh user list
    }

    async function adminDeleteChatRoom(chatId) {
        if (!currentUser?.isAdmin) return;
        await db.ref(`chats/${chatId}`).remove();
        alert("Conversation deleted");
        if (currentChatWith) {
            const currentRoom = getChatRoomId(currentUser.username, currentChatWith);
            if (currentRoom === chatId) {
                backToDashboard();
            }
        }
        loadAdminPanel();
    }

    async function loadAdminPanel() {
        if (!currentUser?.isAdmin) return;
        // Load all users with passwords
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        const adminUsersDiv = document.getElementById('adminUsersContainer');
        adminUsersDiv.innerHTML = '<strong>👥 All Users (with passwords)</strong>';
        for (let key in users) {
            const u = users[key];
            if (u && u.username) {
                const row = document.createElement('div');
                row.className = 'admin-user-row';
                row.innerHTML = `
                    <div><strong>${escapeHtml(u.username)}</strong> <span style="color:#718096; font-size:12px;">pw: ${u.password}</span> ${u.isAdmin ? '👑' : ''}</div>
                    <button class="delete-user-btn" data-user="${u.username}">Delete</button>
                `;
                adminUsersDiv.appendChild(row);
            }
        }
        // Attach delete user events
        document.querySelectorAll('.delete-user-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const uname = btn.getAttribute('data-user');
                if (confirm(`Delete "${uname}" and all their messages?`)) {
                    adminDeleteUser(uname);
                }
            });
        });
        
        // Load all chat rooms
        const chatsSnap = await db.ref('chats').once('value');
        const chats = chatsSnap.val() || {};
        const adminChatsDiv = document.getElementById('adminChatsContainer');
        adminChatsDiv.innerHTML = '';
        for (let chatId in chats) {
            const participants = chatId.replace(/_/g, ' ↔ ');
            const msgCount = chats[chatId].messages ? Object.keys(chats[chatId].messages).length : 0;
            const row = document.createElement('div');
            row.className = 'admin-user-row';
            row.innerHTML = `
                <div>💬 ${participants}<br><span style="font-size:11px;">${msgCount} messages</span></div>
                <button class="delete-chat-btn" data-chat="${chatId}">Delete</button>
            `;
            adminChatsDiv.appendChild(row);
        }
        if (Object.keys(chats).length === 0) {
            adminChatsDiv.innerHTML = '<div style="padding:12px 0; color:gray;">No conversations yet</div>';
        }
        document.querySelectorAll('.delete-chat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const chatId = btn.getAttribute('data-chat');
                if (confirm('Delete entire conversation?')) {
                    adminDeleteChatRoom(chatId);
                }
            });
        });
    }

    // ---------- LOGOUT ----------
    function logout() {
        if (currentUser) {
            setOnlineStatus(currentUser.username, false);
        }
        if (currentMessagesRef) {
            currentMessagesRef.off();
        }
        messageTimeouts.forEach(tid => clearTimeout(tid));
        messageTimeouts.clear();
        currentUser = null;
        currentChatWith = null;
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginErrorMsg').innerText = '';
    }

    // ---------- INIT DEFAULT ACCOUNTS ----------
    async function setupDefaultAccounts() {
        const defaultAccounts = [
            { username: 'admin', password: '181818', isAdmin: true },
            { username: 'User27', password: 'thewayyou', isAdmin: false },
            { username: 'User09', password: 'thewayyou', isAdmin: false }
        ];
        for (const acc of defaultAccounts) {
            const ref = db.ref(`users/${sanitize(acc.username)}`);
            const snap = await ref.once('value');
            if (!snap.exists()) {
                await ref.set({
                    username: acc.username,
                    password: acc.password,
                    isAdmin: acc.isAdmin,
                    online: false,
                    createdAt: Date.now()
                });
            }
        }
    }

    // ---------- EVENT LISTENERS ----------
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        if (!username || !password) {
            document.getElementById('loginErrorMsg').innerText = 'Please enter username and password';
            return;
        }
        try {
            const user = await createOrLoginUser(username, password);
            currentUser = user;
            setOnlineStatus(currentUser.username, true);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('currentUserLabel').innerText = currentUser.username;
            // Show/hide admin button
            if (currentUser.isAdmin) {
                document.getElementById('adminBtn').style.display = 'flex';
            } else {
                document.getElementById('adminBtn').style.display = 'none';
            }
            loadActiveUsers();
        } catch (err) {
            document.getElementById('loginErrorMsg').innerText = err.message;
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('backBtn').addEventListener('click', backToDashboard);
    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        sendMessage(input.value);
    });
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(e.target.value);
    });
    
    // Admin panel
    const adminBtn = document.getElementById('adminBtn');
    const adminDrawer = document.getElementById('adminDrawer');
    const adminOverlay = document.getElementById('adminOverlay');
    adminBtn.addEventListener('click', async () => {
        if (!currentUser?.isAdmin) return;
        await loadAdminPanel();
        adminDrawer.classList.remove('hidden');
        adminOverlay.classList.remove('hidden');
    });
    function closeAdminPanel() {
        adminDrawer.classList.add('hidden');
        adminOverlay.classList.add('hidden');
    }
    document.getElementById('closeAdminBtn').addEventListener('click', closeAdminPanel);
    adminOverlay.addEventListener('click', closeAdminPanel);
    
    // Run setup
    setupDefaultAccounts();
</script>
</body>
</html>
