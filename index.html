<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ShadowChat · OME Style | Cross-device</title>
  <!-- Firebase SDKs (Compat version for quick integration) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s ease, color 0.2s, border 0.2s, box-shadow 0.2s;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    body {
      background: #f1f5f9;
      color: #0f172a;
      padding: 18px;
      min-height: 100vh;
    }

    /* DARK MODE */
    body.dark {
      background: #0a0c10;
      color: #e9edf2;
    }

    .app-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(3px);
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
    }
    body.dark .app-wrapper {
      background: #11151cee;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
    }

    /* header */
    .top-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: #ffffffcc;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e2e8f0;
    }
    body.dark .top-header {
      background: #1e2432cc;
      border-bottom: 1px solid #2d3748;
    }
    .brand h2 {
      font-size: 1.65rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .status-tools {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .online-counter {
      background: #10b98120;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #10b981;
      border: 1px solid #10b98160;
    }
    .dark-toggle {
      background: #33415530;
      border: none;
      padding: 0.45rem 1.1rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .dark-toggle:hover { background: #47556960; }

    /* auth panel */
    .auth-zone {
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8fafc;
    }
    body.dark .auth-zone {
      background: #0f1219;
    }
    .auth-card {
      max-width: 440px;
      width: 100%;
      background: white;
      padding: 2rem;
      border-radius: 2rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    body.dark .auth-card {
      background: #1e2432;
    }
    .input-field {
      margin-bottom: 1.2rem;
    }
    .input-field input {
      width: 100%;
      padding: 0.85rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 0.95rem;
    }
    body.dark .input-field input {
      background: #0f111a;
      border-color: #334155;
      color: #f1f5f9;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 2.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:active { transform: scale(0.97); }
    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
    body.dark .btn-outline { color: #90cdf4; border-color: #60a5fa; }
    .error-text { color: #ef4444; font-size: 0.75rem; margin-top: 0.4rem; }

    /* main chat layout */
    .chat-dashboard {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      height: 70vh;
      min-height: 520px;
    }
    .users-panel {
      width: 280px;
      background: #ffffffcc;
      backdrop-filter: blur(4px);
      border-right: 1px solid #e2e8f0;
      padding: 1.2rem;
      overflow-y: auto;
    }
    body.dark .users-panel {
      background: #11151cee;
      border-right-color: #2d3748;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffffb3;
    }
    body.dark .chat-area {
      background: #0f121ccc;
    }
    .messages-window {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg-bubble {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 1.6rem;
      background: #e2e8f0;
      align-self: flex-start;
      word-break: break-word;
    }
    .own-msg {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
    }
    body.dark .msg-bubble {
      background: #2d3748;
      color: #e2e8f0;
    }
    body.dark .own-msg {
      background: #2563eb;
    }
    .msg-meta {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 5px;
    }
    .typing-area-status {
      font-style: italic;
      font-size: 0.8rem;
      padding: 0.3rem 1rem;
      color: #94a3b8;
    }
    .msg-input-row {
      display: flex;
      padding: 1rem;
      gap: 0.7rem;
      border-top: 1px solid #e2e8f0;
      background: inherit;
    }
    .msg-input-row input {
      flex: 1;
      border-radius: 2.5rem;
      padding: 0.8rem 1.2rem;
    }
    .online-user-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem;
      margin: 0.4rem 0;
      border-radius: 1rem;
      background: #eef2ff30;
    }
    .green-led {
      width: 9px;
      height: 9px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 4px #22c55e;
    }
    .admin-console {
      background: #1e293b30;
      padding: 0.9rem;
      border-radius: 1.2rem;
      margin-top: 0.8rem;
    }
    hr { margin: 0.8rem 0; border-color: #33415540; }
    .admin-btn-sm {
      font-size: 0.75rem;
      padding: 0.4rem 0.7rem;
      margin-top: 0.3rem;
      width: 100%;
    }
    @media (max-width: 720px) {
      .users-panel { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; max-height: 210px; }
      .chat-dashboard { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-wrapper" id="appContainer">
  <div class="top-header">
    <div class="brand"><h2>✦ ShadowTalk · OME</h2></div>
    <div class="status-tools">
      <span id="liveOnlineBadge" class="online-counter">🟢 0 online</span>
      <button id="themeSwitcherBtn" class="dark-toggle">🌙 Dark mode</button>
    </div>
  </div>

  <!-- AUTH SECTION -->
  <div id="authPanelWrapper" class="auth-zone">
    <div class="auth-card">
      <h3 style="margin-bottom: 1rem;">🔐 Enter the shadows</h3>
      <div class="input-field"><input type="text" id="loginUsernameInput" placeholder="Username (User09, User27 or admin)" autocomplete="off"></div>
      <div class="input-field"><input type="password" id="loginPasswordInput" placeholder="Password"></div>
      <button id="doLoginBtn">Sign in →</button>
      <div style="margin: 1.2rem 0; text-align: center;">⚡ ― or create account ― ⚡</div>
      <div class="input-field"><input type="email" id="regEmailInput" placeholder="Your email (for contact)"></div>
      <div class="input-field"><input type="text" id="regUsernameInput" placeholder="New username"></div>
      <div class="input-field"><input type="password" id="regPasswordInput" placeholder="New password"></div>
      <button id="doRegisterBtn" class="btn-outline">Create account</button>
      <div id="globalAuthError" class="error-text"></div>
      <div style="margin-top: 1rem; font-size: 0.7rem; text-align: center;">🔑 default: User09 / thewayyou | admin / 180236361</div>
    </div>
  </div>

  <!-- MAIN CHAT INTERFACE (hidden until auth) -->
  <div id="mainChatInterface" style="display: none;">
    <div class="chat-dashboard">
      <div class="users-panel">
        <h4>👥 Online now</h4>
        <div id="onlineUsersContainer" style="margin-top: 0.6rem;"></div>
        <hr>
        <div id="adminToolsBlock" style="display: none;">
          <div class="admin-console">
            <strong>🛡️ Admin panel</strong>
            <button id="adminClearAllMessagesBtn" style="background:#dc2626; margin-top: 8px;" class="admin-btn-sm">🧹 Erase ALL messages</button>
            <button id="adminDeleteUserByUsernameBtn" style="background:#ea580c; margin-top: 6px;" class="admin-btn-sm">❌ Delete user & data</button>
            <div class="input-field" style="margin-top: 8px;"><input type="text" id="adminTargetUsername" placeholder="Username to delete"></div>
            <button id="adminChangeUserPasswordBtn" style="background:#2563eb;" class="admin-btn-sm">🔐 Send password reset</button>
            <div class="input-field"><input type="text" id="adminPwdResetUser" placeholder="Username"><input type="text" id="adminPwdResetNote" placeholder="(reset via email)" disabled style="opacity:0.7;"></div>
            <button id="adminCheckPasswordHintBtn" style="background:#475569;" class="admin-btn-sm">🔍 Show password policy</button>
            <div id="adminFeedbackMsg" style="font-size: 11px; margin-top: 8px; color: #facc15;"></div>
          </div>
        </div>
      </div>
      <div class="chat-area">
        <div id="messageList" class="messages-window"></div>
        <div id="globalTypingHint" class="typing-area-status"></div>
        <div class="msg-input-row">
          <input type="text" id="chatMessageInput" placeholder="Type a message...">
          <button id="sendMessageButton">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ======================= FIREBASE CONFIG (EXACT FROM USER) =======================
  const firebaseConfig = {
    apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
    authDomain: "chatapp-1dabd.firebaseapp.com",
    projectId: "chatapp-1dabd",
    storageBucket: "chatapp-1dabd.firebasestorage.app",
    messagingSenderId: "203806709864",
    appId: "1:203806709864:web:f739450e99bcb5964043dd",
    measurementId: "G-YE19PXXBEZ"
  };
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  // ---------- GLOBAL STATE ----------
  let currentAppUser = null;        // { uid, username, isAdmin }
  let messagesDatabaseRef = null;
  let onlineTrackerRef = null;
  let typingIndicatorRef = null;
  let activeTypingTimeout = null;

  // Helper UI
  function showChatUI(show) {
    document.getElementById('authPanelWrapper').style.display = show ? 'none' : 'flex';
    document.getElementById('mainChatInterface').style.display = show ? 'flex' : 'none';
  }

  // Dark mode persistence
  const themeBtn = document.getElementById('themeSwitcherBtn');
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkModePref', document.body.classList.contains('dark'));
  });
  if (localStorage.getItem('darkModePref') === 'true') document.body.classList.add('dark');

  // Escape html
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

  // --------------------- DEFAULT USERS AUTO-SEED (User09, User27, admin) -----------------
  async function seedDefaultUsers() {
    const defaults = [
      { username: "User09", password: "thewayyou", isAdmin: false, emailPrefix: "user09" },
      { username: "User27", password: "thewayyou", isAdmin: false, emailPrefix: "user27" },
      { username: "admin", password: "180236361", isAdmin: true, emailPrefix: "admin_main" }
    ];
    for (const u of defaults) {
      const email = `${u.emailPrefix}_shadow@omechat.local`;
      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, u.password);
        await database.ref('users/' + userCred.user.uid).set({
          username: u.username,
          isAdmin: u.isAdmin,
          email: email,
          createdAt: Date.now()
        });
      } catch (err) {
        if (err.code === 'auth/email-already-in-use') {
          // sign in to check and update metadata if needed
          try {
            const signInCred = await auth.signInWithEmailAndPassword(email, u.password);
            const uid = signInCred.user.uid;
            const snap = await database.ref('users/' + uid).once('value');
            if (!snap.exists()) {
              await database.ref('users/' + uid).set({ username: u.username, isAdmin: u.isAdmin, email: email });
            }
            await auth.signOut();
          } catch(e) { console.warn(e); }
        } else if (err.code !== 'auth/email-already-in-use') {
          console.warn(err);
        }
      }
    }
  }

  // --------------------- LOGIN LOGIC -------------------------
  document.getElementById('doLoginBtn').onclick = async () => {
    const usernameRaw = document.getElementById('loginUsernameInput').value.trim();
    const password = document.getElementById('loginPasswordInput').value;
    const errorDiv = document.getElementById('globalAuthError');
    if (!usernameRaw || !password) { errorDiv.innerText = "❌ username & password required"; return; }
    // map username to email pattern (same as seeding)
    let email = "";
    if (usernameRaw === "admin") email = "admin_main_shadow@omechat.local";
    else if (usernameRaw === "User09") email = "user09_shadow@omechat.local";
    else if (usernameRaw === "User27") email = "user27_shadow@omechat.local";
    else email = usernameRaw + "@custom.local"; // for custom accounts

    try {
      const credential = await auth.signInWithEmailAndPassword(email, password);
      const uid = credential.user.uid;
      const userProfileSnap = await database.ref('users/' + uid).once('value');
      if (!userProfileSnap.exists()) throw new Error("Profile missing");
      const profile = userProfileSnap.val();
      currentAppUser = { uid, username: profile.username, isAdmin: profile.isAdmin === true };
      // initialize realtime listeners
      await initChatEnvironment();
      showChatUI(true);
      errorDiv.innerText = "";
    } catch (err) {
      errorDiv.innerText = "Login failed: " + err.message;
    }
  };

  // --------------------- REGISTER (with valid email) -------------------------
  document.getElementById('doRegisterBtn').onclick = async () => {
    const email = document.getElementById('regEmailInput').value.trim();
    const newUsername = document.getElementById('regUsernameInput').value.trim();
    const newPassword = document.getElementById('regPasswordInput').value;
    const errorDiv = document.getElementById('globalAuthError');
    if (!email || !newUsername || !newPassword) { errorDiv.innerText = "Email, username and password required"; return; }
    if (!email.includes('@') || !email.includes('.')) { errorDiv.innerText = "Provide a valid email address"; return; }
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, newPassword);
      await database.ref('users/' + cred.user.uid).set({
        username: newUsername,
        isAdmin: false,
        email: email,
        createdAt: Date.now()
      });
      errorDiv.innerText = "✅ Account created! Please login now.";
      document.getElementById('regEmailInput').value = "";
      document.getElementById('regUsernameInput').value = "";
      document.getElementById('regPasswordInput').value = "";
    } catch (err) {
      errorDiv.innerText = err.message;
    }
  };

  // --------------------- CORE CHAT & ONLINE, TYPING -------------------------
  async function initChatEnvironment() {
    if (messagesDatabaseRef) messagesDatabaseRef.off();
    if (onlineTrackerRef) onlineTrackerRef.off();
    if (typingIndicatorRef) typingIndicatorRef.off();

    messagesDatabaseRef = database.ref('messages');
    onlineTrackerRef = database.ref('onlineUsers');
    typingIndicatorRef = database.ref('typingIndicators');

    // Presence: mark online
    const userOnlineNode = database.ref('onlineUsers/' + currentAppUser.uid);
    await userOnlineNode.set({ username: currentAppUser.username, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    userOnlineNode.onDisconnect().remove();

    // Load previous messages
    messagesDatabaseRef.orderByChild('timestamp').limitToLast(120).on('child_added', (snapshot) => {
      const msg = snapshot.val();
      appendMessageToDOM(msg);
    });

    // Online users list & counter
    function refreshOnlineList() {
      onlineTrackerRef.once('value', (snap) => {
        const usersObj = snap.val() || {};
        const onlineNames = Object.values(usersObj).map(u => u.username);
        const uniqueNames = [...new Set(onlineNames)];
        document.getElementById('liveOnlineBadge').innerHTML = `🟢 ${uniqueNames.length} online`;
        const container = document.getElementById('onlineUsersContainer');
        container.innerHTML = uniqueNames.map(name => `<div class="online-user-item"><span class="green-led"></span> ${escapeHtml(name)}</div>`).join('');
      });
    }
    onlineTrackerRef.on('value', () => refreshOnlineList());

    // Typing indicator: "nagiisip anong kasinungalingan"
    const messageInputField = document.getElementById('chatMessageInput');
    const typingStatusDiv = document.getElementById('globalTypingHint');
    const myTypingRef = database.ref('typingIndicators/' + currentAppUser.uid);
    
    messageInputField.addEventListener('input', () => {
      myTypingRef.set({ username: currentAppUser.username, isTyping: true, updated: Date.now() });
      if (activeTypingTimeout) clearTimeout(activeTypingTimeout);
      activeTypingTimeout = setTimeout(() => {
        myTypingRef.remove();
      }, 1500);
    });
    
    typingIndicatorRef.on('value', (snap) => {
      const typingData = snap.val();
      if (!typingData) { typingStatusDiv.innerText = ""; return; }
      const typingUsers = Object.values(typingData).filter(t => t.isTyping === true && t.username !== currentAppUser.username);
      if (typingUsers.length > 0) {
        const names = typingUsers.map(t => t.username).join(', ');
        typingStatusDiv.innerText = `✍️ ${names} nagiisip anong kasinungalingan...`;
      } else {
        typingStatusDiv.innerText = "";
      }
    });

    // Send message
    const sendBtn = document.getElementById('sendMessageButton');
    const sendMessage = async () => {
      const text = messageInputField.value.trim();
      if (!text) return;
      const newMsg = {
        text: text,
        username: currentAppUser.username,
        uid: currentAppUser.uid,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
      };
      await messagesDatabaseRef.push(newMsg);
      messageInputField.value = '';
      await myTypingRef.remove();
    };
    sendBtn.onclick = sendMessage;
    messageInputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Admin tools visibility
    if (currentAppUser.isAdmin) {
      document.getElementById('adminToolsBlock').style.display = 'block';
      attachAdminFeatures();
    } else {
      document.getElementById('adminToolsBlock').style.display = 'none';
    }
  }

  function appendMessageToDOM(msg) {
    const container = document.getElementById('messageList');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg-bubble';
    if (currentAppUser && msg.uid === currentAppUser.uid) msgDiv.classList.add('own-msg');
    const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'now';
    msgDiv.innerHTML = `<strong>${escapeHtml(msg.username)}</strong><br/>${escapeHtml(msg.text)}<div class="msg-meta">${timeStr}</div>`;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  // --------------------- ADMIN: delete messages, delete users, reset password (via email), etc. -----------------
  async function attachAdminFeatures() {
    const clearAllBtn = document.getElementById('adminClearAllMessagesBtn');
    const deleteUserBtn = document.getElementById('adminDeleteUserByUsernameBtn');
    const changePwdBtn = document.getElementById('adminChangeUserPasswordBtn');
    const checkHintBtn = document.getElementById('adminCheckPasswordHintBtn');
    const adminFeedback = document.getElementById('adminFeedbackMsg');

    clearAllBtn.onclick = async () => {
      if (confirm("⚠️ ADMIN: DELETE ALL CHAT MESSAGES FOREVER?")) {
        await messagesDatabaseRef.remove();
        adminFeedback.innerText = "✅ All chat history wiped.";
        setTimeout(() => adminFeedback.innerText = "", 2000);
      }
    };

    deleteUserBtn.onclick = async () => {
      const targetUser = document.getElementById('adminTargetUsername').value.trim();
      if (!targetUser) { adminFeedback.innerText = "Enter username to delete"; return; }
      const usersSnap = await database.ref('users').once('value');
      let targetUid = null;
      const usersMap = usersSnap.val() || {};
      for (let [uid, val] of Object.entries(usersMap)) {
        if (val.username === targetUser) { targetUid = uid; break; }
      }
      if (!targetUid) { adminFeedback.innerText = "User not found"; return; }
      if (confirm(`Delete user "${targetUser}" AND erase their messages?`)) {
        // delete user's messages
        const msgsSnapshot = await messagesDatabaseRef.orderByChild('uid').equalTo(targetUid).once('value');
        const updates = {};
        msgsSnapshot.forEach(childSnap => { updates[childSnap.key] = null; });
        if (Object.keys(updates).length) await messagesDatabaseRef.update(updates);
        await database.ref('users/' + targetUid).remove();
        await database.ref('onlineUsers/' + targetUid).remove();
        adminFeedback.innerText = `🗑️ User ${targetUser} removed (messages purged).`;
      }
    };

    changePwdBtn.onclick = async () => {
      const username = document.getElementById('adminPwdResetUser').value.trim();
      if (!username) { adminFeedback.innerText = "Enter username to send password reset email"; return; }
      const usersSnap = await database.ref('users').once('value');
      let userEmail = null;
      for (let [uid, val] of Object.entries(usersSnap.val() || {})) {
        if (val.username === username) { userEmail = val.email; break; }
      }
      if (!userEmail || !userEmail.includes('@')) { adminFeedback.innerText = "No valid email found for that user (cannot reset)."; return; }
      try {
        await auth.sendPasswordResetEmail(userEmail);
        adminFeedback.innerText = `📧 Password reset email sent to ${userEmail}. User can set new password.`;
      } catch (err) {
        adminFeedback.innerText = "Error sending reset: " + err.message;
      }
    };

    checkHintBtn.onclick = () => {
      adminFeedback.innerText = "🔐 Password policy: use reset email. Admin cannot view plain passwords (hashed). To change password, user must follow reset link.";
    };
  }

  // --------------------- ON PAGE LOAD: seed defaults & auth state listener -----------------
  window.onload = async () => {
    await seedDefaultUsers();
    // listen to auth state
    auth.onAuthStateChanged(async (firebaseUser) => {
      if (firebaseUser) {
        const profileSnap = await database.ref('users/' + firebaseUser.uid).once('value');
        if (profileSnap.exists()) {
          const profile = profileSnap.val();
          currentAppUser = { uid: firebaseUser.uid, username: profile.username, isAdmin: profile.isAdmin === true };
          await initChatEnvironment();
          showChatUI(true);
        } else {
          await auth.signOut();
          showChatUI(false);
        }
      } else {
        showChatUI(false);
        currentAppUser = null;
      }
    });
  };
</script>
</body>
</html>
