<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultimate Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d0d0d;
  color:white;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
input { background:#1a1a1a; color:white; }
button { background:#00c853; color:white; font-weight:bold; }

.message {
  background:#1e1e1e;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
.small { font-size:12px; color:#aaa; }
.hidden { display:none; }

.admin {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- CHAT -->
<div id="chatBox" class="hidden">
  <h3 id="welcome"></h3>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
  <button onclick="logout()">Logout</button>

  <!-- ADMIN -->
  <div id="adminPanel" class="hidden">

    <div class="admin">
      <button onclick="clearChat()">Clear All Messages</button>
    </div>

    <div class="admin">
      <input id="newUser" placeholder="New Username">
      <button onclick="addUser()">Add User</button>
      <p id="newPass"></p>
    </div>

    <div class="admin">
      <input id="delUser" placeholder="Delete Username">
      <button onclick="deleteUser()">Delete User</button>
    </div>

  </div>
</div>

</div>

<script type="module">

// 🔥 FIREBASE IMPORTS (FIXED)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  getDocs,
  deleteDoc,
  doc,
  getDoc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR CONFIG (CLEAN)
const firebaseConfig = {
  apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
  authDomain: "chatapp-1dabd.firebaseapp.com",
  projectId: "chatapp-1dabd",
  storageBucket: "chatapp-1dabd.firebasestorage.app",
  messagingSenderId: "203806709864",
  appId: "1:203806709864:web:f739450e99bcb5964043dd"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

/* ================= LOGIN ================= */
window.login = async function(){
  const u = user.value.trim();
  const p = pass.value.trim();

  const ref = doc(db, "users", u);
  const snap = await getDoc(ref);

  if(snap.exists() && snap.data().password === p){

    currentUser = u;

    loginBox.classList.add("hidden");
    chatBox.classList.remove("hidden");
    welcome.innerText = "Welcome " + u;

    loadMessages();

    if(u === "admin"){
      adminPanel.classList.remove("hidden");
    }

  } else {
    alert("Invalid login");
  }
};

/* ================= SEND MESSAGE ================= */
window.sendMsg = async function(){
  const text = msg.value.trim();
  if(!text) return;

  await addDoc(collection(db, "messages"), {
    user: currentUser,
    text: text,
    time: serverTimestamp()
  });

  msg.value = "";
};

/* ================= REALTIME CHAT ================= */
function loadMessages(){
  const q = query(collection(db, "messages"), orderBy("time","asc"));

  onSnapshot(q, (snapshot) => {
    messages.innerHTML = "";

    snapshot.forEach(d => {
      const m = d.data();

      const div = document.createElement("div");
      div.className = "message";

      const t = m.time?.seconds
        ? new Date(m.time.seconds * 1000).toLocaleTimeString()
        : "";

      div.innerHTML = `
        <b>${m.user}</b><br>
        ${m.text}
        <div class="small">${t}</div>
      `;

      messages.appendChild(div);
    });
  });
}

/* ================= LOGOUT ================= */
window.logout = function(){
  location.reload();
};

/* ================= ADMIN FUNCTIONS ================= */
window.clearChat = async function(){
  const snap = await getDocs(collection(db,"messages"));
  snap.forEach(async d => {
    await deleteDoc(doc(db,"messages",d.id));
  });
  alert("Chat cleared");
};

function genPass(){
  return Math.random().toString(36).slice(-8);
}

window.addUser = async function(){
  const name = newUser.value.trim();
  if(!name) return;

  const pass = genPass();

  await setDoc(doc(db,"users",name),{
    password: pass
  });

  newPass.innerText = `User: ${name} | Pass: ${pass}`;
};

window.deleteUser = async function(){
  const name = delUser.value.trim();
  if(!name) return;

  await deleteDoc(doc(db,"users",name));
  alert("User deleted");
};

</script>

</body>
</html>
