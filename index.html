<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: #0e1621;
            --tg-header: #17212b;
            --tg-sent: #2b5278;
            --tg-received: #182533;
            --tg-text: #f5f5f5;
        }

        body { 
            background-color: #000; 
            color: var(--tg-text); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }

        /* Telegram-style Vertical Container */
        .phone-wrapper {
            width: 100%;
            max-width: 450px; /* Standard Mobile Width */
            height: 100%;
            background-color: var(--tg-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 14px; 
            display: flex; 
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .bubble { 
            max-width: 85%; 
            padding: 8px 12px; 
            margin-bottom: 4px; 
            font-size: 15px; 
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .sent { 
            background-color: var(--tg-sent); 
            align-self: flex-end; 
            border-radius: 12px 12px 2px 12px; 
        }

        .received { 
            background-color: var(--tg-received); 
            align-self: flex-start; 
            border-radius: 12px 12px 12px 2px; 
        }

        .sender-name {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 2px;
            color: #4da3ff;
        }

        .input-area { 
            background: var(--tg-header); 
            padding: 10px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .input-box {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 5px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div id="login-screen" class="flex flex-col items-center justify-center h-full px-10">
            <h1 class="text-3xl font-bold mb-10 text-blue-400">Circle Chat</h1>
            <input type="text" id="username" placeholder="Username" class="w-full p-4 mb-4 rounded-lg bg-[#17212b] border border-gray-700 text-white">
            <input type="password" id="password" placeholder="Key" class="w-full p-4 mb-8 rounded-lg bg-[#17212b] border border-gray-700 text-white">
            <button onclick="login()" class="w-full bg-blue-500 py-4 rounded-lg font-bold">START MESSAGING</button>
            <p id="login-error" class="text-red-500 mt-4 hidden">Access Denied</p>
        </div>

        <div id="chat-screen" class="hidden flex flex-col h-full">
            <header class="p-3 bg-[#17212b] flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">C</div>
                    <div>
                        <div class="font-bold text-sm">Circle Chat</div>
                        <div class="text-xs text-blue-400">User27 & User 09</div>
                    </div>
                </div>
                <button onclick="showAdmin()" class="text-xs opacity-50">Admin</button>
            </header>

            <div id="messages" class="chat-container"></div>

            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Message" class="input-box">
                <button onclick="sendMessage()" class="text-blue-400 font-bold px-2">SEND</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
        <div class="bg-[#17212b] p-6 rounded-xl w-full max-w-xs">
            <h3 class="font-bold mb-4">Edit Users</h3>
            <input type="number" id="admin-idx" class="w-full p-2 mb-2 bg-[#0e1621] rounded" placeholder="0 or 1">
            <input type="text" id="admin-name" class="w-full p-2 mb-2 bg-[#0e1621] rounded" placeholder="New Name">
            <input type="text" id="admin-pass" class="w-full p-2 mb-4 bg-[#0e1621] rounded" placeholder="New Key">
            <button onclick="applyAdmin()" class="w-full bg-green-600 p-2 rounded mb-2">Save</button>
            <button onclick="hideAdmin()" class="w-full bg-gray-600 p-2 rounded">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCBFQ44up8oGRleBbT7GACOLY9zZsraAc",
            authDomain: "circle-chat-a2e81.firebaseapp.com",
            projectId: "circle-chat-a2e81",
            storageBucket: "circle-chat-a2e81.firebasestorage.app",
            messagingSenderId: "975339459589",
            appId: "1:975339459589:web:6f4ced5e6f38d87d91b86c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'private_circle_chat');

        let currentUser = localStorage.getItem('circleUser');
        let users = JSON.parse(localStorage.getItem('circleProfiles')) || [
            { name: "User27", pass: "thewayyou" },
            { name: "User 09", pass: "thewayyou" }
        ];

        if (currentUser) window.onload = showChat;

        window.login = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const found = users.find(user => user.name === u && user.pass === p);
            if (found) {
                currentUser = found.name;
                localStorage.setItem('circleUser', currentUser);
                showChat();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        function showChat() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const container = document.getElementById('messages');
                const isMe = data.sender === currentUser;
                const div = document.createElement('div');
                div.id = `m-${snap.key}`;
                div.className = `bubble ${isMe ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${!isMe ? `<div class="sender-name">${data.sender}</div>` : ''}
                    <div>${data.text}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });

            onChildRemoved(chatRef, (snap) => {
                const el = document.getElementById(`m-${snap.key}`);
                if (el) el.remove();
            });

            setInterval(cleanup, 10000);
        }

        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(chatRef, { sender: currentUser, text: input.value, t: Date.now() });
            input.value = "";
        };

        function cleanup() {
            const cutoff = Date.now() - 120000;
            onValue(chatRef, (snap) => {
                snap.forEach(child => {
                    if (child.val().t < cutoff) remove(ref(db, `private_circle_chat/${child.key}`));
                });
            }, { onlyOnce: true });
        }

        window.showAdmin = () => document.getElementById('admin-modal').classList.remove('hidden');
        window.hideAdmin = () => document.getElementById('admin-modal').classList.add('hidden');
        window.applyAdmin = () => {
            const i = document.getElementById('admin-idx').value;
            const n = document.getElementById('admin-name').value;
            const p = document.getElementById('admin-pass').value;
            if(users[i]) {
                if(n) users[i].name = n;
                if(p) users[i].pass = p;
                localStorage.setItem('circleProfiles', JSON.stringify(users));
                location.reload();
            }
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
