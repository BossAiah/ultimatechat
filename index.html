<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ShadowChat · OME Style</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s ease, color 0.2s, border 0.2s;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      padding: 20px;
      min-height: 100vh;
    }

    /* DARK MODE (default based on system? but we'll use toggle) */
    body.dark {
      background: #0a0c10;
      color: #e9edf2;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
    }
    body.dark .app-container {
      background: #11151c;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }

    /* header / top bar */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.8rem;
      background: #ffffffcc;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e2e8f0;
    }
    body.dark .top-bar {
      background: #1e2432cc;
      border-bottom: 1px solid #2d3748;
    }
    .logo h2 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .status-area {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .online-badge {
      background: #10b98120;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #10b981;
      border: 1px solid #10b98140;
    }
    body.dark .online-badge {
      background: #10b98120;
    }
    .theme-toggle {
      background: #33415520;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }
    .admin-badge {
      background: #f97316;
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    /* auth panel */
    .auth-panel {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #f8fafc;
    }
    body.dark .auth-panel {
      background: #0f1219;
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 1.8rem;
      border-radius: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    body.dark .auth-card {
      background: #1e2432;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 1rem;
    }
    body.dark input {
      background: #0f111a;
      border-color: #334155;
      color: #f1f5f9;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #2563eb;
      transform: scale(0.98);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
    body.dark .btn-outline {
      color: #60a5fa;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    /* main chat area */
    .chat-layout {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      height: 70vh;
      min-height: 500px;
    }
    .users-sidebar {
      width: 280px;
      background: #ffffffaa;
      backdrop-filter: blur(4px);
      border-right: 1px solid #e2e8f0;
      padding: 1rem;
      overflow-y: auto;
    }
    body.dark .users-sidebar {
      background: #11151cee;
      border-right-color: #2d3748;
    }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff80;
    }
    body.dark .chat-main {
      background: #0f121ccc;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .message-bubble {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 1.8rem;
      background: #e2e8f0;
      align-self: flex-start;
      word-break: break-word;
    }
    .my-message {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
    }
    body.dark .message-bubble {
      background: #2d3748;
      color: #e2e8f0;
    }
    body.dark .my-message {
      background: #2563eb;
    }
    .message-meta {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
    }
    .typing-indicator {
      font-style: italic;
      font-size: 0.8rem;
      padding: 0.3rem 1rem;
      color: #94a3b8;
    }
    .input-area {
      display: flex;
      padding: 1rem;
      gap: 0.5rem;
      border-top: 1px solid #e2e8f0;
      background: inherit;
    }
    .input-area input {
      flex: 1;
      border-radius: 2rem;
    }
    .online-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      margin: 0.3rem 0;
      border-radius: 1rem;
      background: #eef2ff40;
    }
    .green-dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
    }
    .admin-panel {
      background: #1e293b20;
      padding: 1rem;
      border-radius: 1rem;
      margin-top: 0.5rem;
    }
    hr {
      margin: 0.8rem 0;
      border-color: #33415540;
    }
    small {
      font-size: 0.7rem;
    }
    @media (max-width: 720px) {
      .users-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; max-height: 200px; }
      .chat-layout { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="top-bar">
    <div class="logo"><h2>✦ ShadowTalk</h2></div>
    <div class="status-area">
      <span id="onlineCountBadge" class="online-badge">🟢 0 online</span>
      <button id="darkModeToggleBtn" class="theme-toggle">🌙 Dark mode</button>
    </div>
  </div>

  <!-- Auth section (login/register) -->
  <div id="authSection" class="auth-panel">
    <div class="auth-card">
      <h3 style="margin-bottom: 1rem;">🔐 Access chat</h3>
      <div class="input-group"><input type="text" id="loginUsername" placeholder="Username (User09, User27 or admin)"></div>
      <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
      <button id="loginBtn">Sign in →</button>
      <div style="margin: 1rem 0; text-align: center;">── or ──</div>
      <div class="input-group"><input type="email" id="regEmail" placeholder="Email (for account creation)"></div>
      <div class="input-group"><input type="text" id="regUsername" placeholder="New username"></div>
      <div class="input-group"><input type="password" id="regPassword" placeholder="New password"></div>
      <button id="registerBtn" class="btn-outline">Create account</button>
      <div id="authError" class="error-msg"></div>
      <div style="margin-top: 1rem; font-size: 0.75rem; text-align: center;">🔑 demo: User09 / thewayyou &nbsp;|&nbsp; admin / 180236361</div>
    </div>
  </div>

  <!-- Main chat interface (hidden until auth) -->
  <div id="chatInterface" style="display: none;">
    <div class="chat-layout">
      <div class="users-sidebar">
        <h4>👥 Online users</h4>
        <div id="onlineUsersList" style="margin-top: 0.5rem;"></div>
        <hr>
        <div id="adminToolsSection" style="display: none;">
          <div class="admin-panel">
            <strong>🔧 Admin cockpit</strong>
            <button id="adminClearAllChatBtn" style="background:#dc2626; margin-top: 8px; width:100%;">🧹 Clear ALL messages</button>
            <button id="adminDeleteUserBtn" style="background:#ea580c; margin-top: 6px; width:100%;">❌ Delete user by username</button>
            <div class="input-group" style="margin-top: 8px;"><input type="text" id="adminTargetUser" placeholder="Username to delete"></div>
            <button id="adminChangePwdBtn" style="background:#2563eb; margin-top: 4px;">🔐 Change password</button>
            <div class="input-group"><input type="text" id="adminChangeUser" placeholder="username"><input type="password" id="adminNewPwd" placeholder="new password"></div>
            <button id="adminCheckPwdBtn" style="background:#475569;">🔍 Check password hash</button>
            <div id="adminResultMsg" style="font-size:12px; margin-top:6px;"></div>
          </div>
        </div>
      </div>
      <div class="chat-main">
        <div id="messagesContainer" class="messages-area"></div>
        <div id="typingStatus" class="typing-indicator"></div>
        <div class="input-area">
          <input type="text" id="messageInput" placeholder="Type a message...">
          <button id="sendMsgBtn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ------------------- FIREBASE INIT (given config)
  const firebaseConfig = {
    apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
    authDomain: "chatapp-1dabd.firebaseapp.com",
    projectId: "chatapp-1dabd",
    storageBucket: "chatapp-1dabd.firebasestorage.app",
    messagingSenderId: "203806709864",
    appId: "1:203806709864:web:f739450e99bcb5964043dd",
    measurementId: "G-YE19PXXBEZ"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  // ------------------- GLOBALS
  let currentUser = null;        // stores { uid, username, isAdmin }
  let typingTimeout = null;
  let onlineRef = null;
  let presenceRef = null;

  // Helper: show/hide UI
  function showChatUI(show) {
    document.getElementById('authSection').style.display = show ? 'none' : 'flex';
    document.getElementById('chatInterface').style.display = show ? 'flex' : 'none';
    if(show) {
      document.querySelector('.chat-layout').style.display = 'flex';
    }
  }

  // Dark mode toggle
  const darkToggle = document.getElementById('darkModeToggleBtn');
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
  });
  if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

  // ------------------- FIREBASE AUTH + DEFAULT USERS (auto create if missing)
  async function ensureDefaultUsers() {
    const defaultUsers = [
      { username: "User09", password: "thewayyou", isAdmin: false },
      { username: "User27", password: "thewayyou", isAdmin: false },
      { username: "admin", password: "180236361", isAdmin: true }
    ];
    for (const u of defaultUsers) {
      try {
        const userCred = await auth.createUserWithEmailAndPassword(u.username + "@shadow.local", u.password);
        // store custom username and admin flag in realtime db
        await database.ref('users/' + userCred.user.uid).set({
          username: u.username,
          isAdmin: u.isAdmin,
          email: u.username + "@local"
        });
      } catch (err) {
        if(err.code === 'auth/email-already-in-use') {
          // user exists, just ensure metadata
          const signIn = await auth.signInWithEmailAndPassword(u.username + "@shadow.local", u.password);
          const uid = signIn.user.uid;
          const snap = await database.ref('users/'+uid).once('value');
          if(!snap.exists()) {
            await database.ref('users/'+uid).set({ username: u.username, isAdmin: u.isAdmin });
          }
          await auth.signOut();
        } else if(err.code !== 'auth/email-already-in-use') console.warn(err);
      }
    }
  }

  // login logic
  document.getElementById('loginBtn').onclick = async () => {
    const usernameRaw = document.getElementById('loginUsername').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('authError');
    if(!usernameRaw || !pwd) { errorDiv.innerText = "Fill username & password"; return; }
    // find user email mapping (we store using pattern)
    let email = "";
    if(usernameRaw === "admin") email = "admin@shadow.local";
    else if(usernameRaw === "User09") email = "User09@shadow.local";
    else if(usernameRaw === "User27") email = "User27@shadow.local";
    else email = usernameRaw + "@shadow.local"; // for custom reg users
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pwd);
      const uid = cred.user.uid;
      const userSnap = await database.ref('users/'+uid).once('value');
      if(!userSnap.exists()) throw new Error("No profile");
      const profile = userSnap.val();
      currentUser = { uid, username: profile.username, isAdmin: profile.isAdmin || false };
      // init realtime listeners
      initChatAfterLogin();
      showChatUI(true);
      errorDiv.innerText = "";
    } catch(e) {
      errorDiv.innerText = "Login failed: " + e.message;
    }
  };

  // Register new account (email required for contact, but not admin check)
  document.getElementById('registerBtn').onclick = async () => {
    const email = document.getElementById('regEmail').value.trim();
    const newUsername = document.getElementById('regUsername').value.trim();
    const newPassword = document.getElementById('regPassword').value;
    const errorDiv = document.getElementById('authError');
    if(!email || !newUsername || !newPassword) { errorDiv.innerText = "Email, username and password required"; return; }
    if(!email.includes('@')) { errorDiv.innerText = "Valid email needed"; return; }
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, newPassword);
      const uid = cred.user.uid;
      await database.ref('users/'+uid).set({ username: newUsername, isAdmin: false, email: email });
      errorDiv.innerText = "Account created! Please login.";
      // clear fields
      document.getElementById('regEmail').value = "";
      document.getElementById('regUsername').value = "";
      document.getElementById('regPassword').value = "";
    } catch(err) { errorDiv.innerText = err.message; }
  };

  // -------- MAIN CHAT FUNCTIONALITY ----------
  let messagesRef = null;
  let onlineUsersRef = null;
  let typingRef = null;
  let currentTypingListener = null;

  function initChatAfterLogin() {
    // clear previous listeners
    if(messagesRef) messagesRef.off();
    if(onlineUsersRef) onlineUsersRef.off();
    if(currentTypingListener) currentTypingListener.off();
    // setup references
    messagesRef = database.ref('messages');
    onlineUsersRef = database.ref('onlineUsers');
    typingRef = database.ref('typingIndicators');
    
    // Presence system (online)
    const userOnlineRef = database.ref('onlineUsers/' + currentUser.uid);
    userOnlineRef.set({ username: currentUser.username, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    userOnlineRef.onDisconnect().remove();
    
    // load messages
    messagesRef.orderByChild('timestamp').limitToLast(100).on('child_added', (snap) => {
      const msg = snap.val();
      addMessageToDOM(msg);
    });
    
    // online users count & list
    function updateOnlineList() {
      onlineUsersRef.once('value', (snap) => {
        const users = snap.val() || {};
        const onlineList = Object.values(users).map(u => u.username);
        const unique = [...new Set(onlineList)];
        document.getElementById('onlineCountBadge').innerHTML = `🟢 ${unique.length} online`;
        const container = document.getElementById('onlineUsersList');
        container.innerHTML = unique.map(un => `<div class="online-user"><span class="green-dot"></span> ${escapeHtml(un)}</div>`).join('');
      });
    }
    onlineUsersRef.on('value', () => updateOnlineList());
    
    // typing indicator: "nagiisip anong kasinungalingan"
    const typingInput = document.getElementById('messageInput');
    const typingStatusDiv = document.getElementById('typingStatus');
    let typingDbRef = database.ref('typingIndicators/' + currentUser.uid);
    typingInput.addEventListener('input', () => {
      typingDbRef.set({ username: currentUser.username, isTyping: true, timestamp: Date.now() });
      if(typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        typingDbRef.remove();
      }, 1500);
    });
    // listen to others typing
    database.ref('typingIndicators').on('value', (snap) => {
      const typingData = snap.val();
      if(!typingData) { typingStatusDiv.innerText = ""; return; }
      const typingUsers = Object.values(typingData).filter(t => t.isTyping === true && t.username !== currentUser.username);
      if(typingUsers.length > 0) {
        const names = typingUsers.map(t => t.username).join(', ');
        typingStatusDiv.innerText = `✍️ ${names} nagiisip anong kasinungalingan...`;
      } else {
        typingStatusDiv.innerText = "";
      }
    });
    
    // Send message
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    
    // Admin UI visibility
    if(currentUser.isAdmin) {
      document.getElementById('adminToolsSection').style.display = 'block';
      attachAdminHandlers();
    } else {
      document.getElementById('adminToolsSection').style.display = 'none';
    }
  }
  
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if(!text) return;
    const msgObj = {
      text: text,
      username: currentUser.username,
      uid: currentUser.uid,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    };
    messagesRef.push(msgObj).then(() => {
      input.value = '';
      // clear typing indicator
      database.ref('typingIndicators/' + currentUser.uid).remove();
    });
  }
  
  function addMessageToDOM(msg) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = 'message-bubble';
    if(msg.uid === currentUser?.uid) div.classList.add('my-message');
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'just now';
    div.innerHTML = `<strong>${escapeHtml(msg.username)}</strong><br/>${escapeHtml(msg.text)}<div class="message-meta">${time}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
  
  // ---------- ADMIN METHODS ----------
  function attachAdminHandlers() {
    const clearBtn = document.getElementById('adminClearAllChatBtn');
    const deleteUserBtn = document.getElementById('adminDeleteUserBtn');
    const changePwdBtn = document.getElementById('adminChangePwdBtn');
    const checkPwdBtn = document.getElementById('adminCheckPwdBtn');
    const resultDiv = document.getElementById('adminResultMsg');
    
    clearBtn.onclick = async () => {
      if(confirm("⚠️ DELETE ALL MESSAGES forever?")) {
        await messagesRef.remove();
        resultDiv.innerText = "✅ All chat messages cleared.";
        setTimeout(() => resultDiv.innerText = "", 2000);
      }
    };
    deleteUserBtn.onclick = async () => {
      const targetUser = document.getElementById('adminTargetUser').value.trim();
      if(!targetUser) { resultDiv.innerText = "Enter username to delete"; return; }
      // find user by username in DB
      const usersSnap = await database.ref('users').once('value');
      const users = usersSnap.val();
      let targetUid = null;
      for(let [uid, val] of Object.entries(users)) {
        if(val.username === targetUser) { targetUid = uid; break; }
      }
      if(!targetUid) { resultDiv.innerText = "User not found"; return; }
      if(confirm(`Delete ${targetUser} permanently? Also wipes messages?`)) {
        // delete user data & auth account via firebase admin not possible on client, but we delete RTDB profile and messages from them.
        const msgsSnap = await messagesRef.orderByChild('uid').equalTo(targetUid).once('value');
        const updates = {};
        msgsSnap.forEach(child => { updates[child.key] = null; });
        if(Object.keys(updates).length) await messagesRef.update(updates);
        await database.ref('users/'+targetUid).remove();
        await database.ref('onlineUsers/'+targetUid).remove();
        resultDiv.innerText = `User ${targetUser} deleted (messages wiped)`;
      }
    };
    changePwdBtn.onclick = async () => {
      const username = document.getElementById('adminChangeUser').value.trim();
      const newPwd = document.getElementById('adminNewPwd').value;
      if(!username || !newPwd) { resultDiv.innerText = "username and new password required"; return; }
      // fetch user email
      const usersSnap = await database.ref('users').once('value');
      let targetUid = null, email = null;
      for(let [uid, val] of Object.entries(usersSnap.val() || {})) {
        if(val.username === username) { targetUid = uid; email = val.email || (username+"@shadow.local"); break; }
      }
      if(!targetUid) { resultDiv.innerText = "User not found"; return; }
      try {
        // need to send password reset? better use update password via admin SDK? not possible, but we can send reset email? but we use email/password so we can create new?
        // due to client side restriction we cannot update password directly without reauthentication. But we can generate password reset link, but for simplicity we'll store a temp pass token.
        // Better: use firebase auth update using current admin? but no. We'll show a note: password reset email sent if email exists.
        if(email && email.includes('@')) {
          await auth.sendPasswordResetEmail(email);
          resultDiv.innerText = `Password reset email sent to ${email}. User must set new password.`;
        } else { resultDiv.innerText = "No valid email, can't reset password automatically. Use manual."; }
      } catch(e) { resultDiv.innerText = "Error: "+e.message; }
    };
    checkPwdBtn.onclick = async () => {
      resultDiv.innerText = "🔐 Password check: Only reset via email. For demo, user password is stored hashed. Use reset email.";
    };
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
  
  // Auto init defaults before anything
  window.onload = async () => {
    await ensureDefaultUsers();
    // check if already signed in from previous?
    auth.onAuthStateChanged(async (user) => {
      if(user) {
        const snap = await database.ref('users/'+user.uid).once('value');
        if(snap.exists()) {
          const profile = snap.val();
          currentUser = { uid: user.uid, username: profile.username, isAdmin: profile.isAdmin || false };
          initChatAfterLogin();
          showChatUI(true);
        } else { await auth.signOut(); showChatUI(false); }
      } else { showChatUI(false); }
    });
  };
</script>
</body>
</html>
