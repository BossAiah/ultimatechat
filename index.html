<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCBFQ44up8oGRleBbT7GACOLY9zZsraAc",
  authDomain: "circle-chat-a2e81.firebaseapp.com",
  projectId: "circle-chat-a2e81",
  storageBucket: "circle-chat-a2e81.firebasestorage.app",
  messagingSenderId: "975339459589",
  appId: "1:975339459589:web:6f4ced5e6f38d87d91b86c",
  measurementId: "G-0SKZS9MCD1"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

// 🔥 KEEP EVERYTHING BELOW EXACTLY THE SAME
const db = getFirestore(app);

let currentUser = "";

// DEFAULT USERS (hidden)
let users = {
  user1: "User27",
  user2: "User09",
  password: "thewayyou"
};

// LOAD CUSTOM USERS
async function loadUsers(){
  const ref = doc(db,"config","users");
  const snap = await getDoc(ref);
  if(snap.exists()){
    users = snap.data();
  }
}
await loadUsers();

// LOGIN
window.login = function(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if(p === users.password && (u === users.user1 || u === users.user2)){
    currentUser = u;
    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";
    loadMessages();
  }
  else if(u === "admin" && p === "admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("admin").style.display="flex";
  }
  else{
    alert("Invalid login");
  }
}

// SEND MESSAGE
window.sendMsg = async function(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  await addDoc(collection(db,"messages"),{
    text: msg,
    user: currentUser,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}

// LOAD MESSAGES REALTIME
function loadMessages(){
  const chatBox = document.getElementById("chatBox");

  onSnapshot(collection(db,"messages"),(snapshot)=>{
    chatBox.innerHTML="";

    snapshot.forEach(docSnap=>{
      const data = docSnap.data();

      // AUTO DELETE AFTER 2 MIN
      if(Date.now() - data.time > 120000){
        deleteDoc(doc(db,"messages",docSnap.id));
        return;
      }

      const div = document.createElement("div");
      div.className = "msg " + (data.user === currentUser ? "me":"other");
      div.innerText = data.user + ": " + data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// ADMIN UPDATE
window.updateUsers = async function(){
  const u1 = document.getElementById("newUser1").value;
  const u2 = document.getElementById("newUser2").value;
  const p = document.getElementById("newPass").value;

  if(!u1 || !u2 || !p) return alert("Fill all");

  await setDoc(doc(db,"config","users"),{
    user1:u1,
    user2:u2,
    password:p
  });

  alert("Updated!");
}

// LOGOUT
window.logout = function(){
  location.reload();
}

// START
document.getElementById("login").style.display="flex";

</script>
