<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Messenger Live · Private Chat</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0e0e10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Messenger container */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #f8f9fc;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* screens */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        /* auth panel (login) */
        .auth-card {
            background: white;
            margin: auto 20px;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
            color: #1b2e4b;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            background: #f5f7fb;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #0084ff;
            background: white;
        }

        .btn {
            background: #0084ff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-danger {
            background: #e34f4f;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0084ff;
            color: #0084ff;
        }

        .error-text {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }

        /* Main dashboard header */
        .chat-header {
            background: white;
            padding: 14px 18px;
            border-bottom: 1px solid #e9eaef;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .user-welcome {
            font-weight: 600;
            font-size: 16px;
            background: #eef2f7;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .logout-icon, .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* People list (active users) */
        .people-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .section-title {
            font-size: 14px;
            padding: 12px 18px 6px;
            color: #6c757d;
            font-weight: 500;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            gap: 14px;
            border-bottom: 1px solid #efeff4;
            cursor: pointer;
            transition: background 0.1s;
        }

        .user-item:active {
            background: #eef2fa;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: #0084ff20;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #0084ff;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #34c759;
        }

        /* chat conversation view */
        .conversation-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fc;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 22px;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }

        .message-sent {
            align-self: flex-end;
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            align-self: flex-start;
            background: white;
            color: #1c1c1e;
            border: 0.5px solid #e2e2e8;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        .chat-input-area {
            background: white;
            padding: 10px 12px;
            border-top: 1px solid #e9eaef;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 15px;
            background: #f8f9fc;
        }

        .send-btn {
            background: #0084ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* admin panel modal drawer */
        .admin-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 28px 28px 0 0;
            max-height: 85%;
            overflow-y: auto;
            z-index: 1000;
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .admin-drawer.hidden {
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .admin-header {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .small-btn {
            background: #e34f4f;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            border: none;
            font-size: 12px;
            margin-left: 6px;
        }

        .close-admin {
            background: #ccc;
            margin-top: 12px;
        }

        .admin-pass {
            font-size: 12px;
            color: gray;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen">
        <div class="auth-card">
            <div class="auth-title">Messenger Live</div>
            <div class="input-group"><input type="text" id="loginUsername" placeholder="Username" autocomplete="off"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <button class="btn" id="doLoginBtn">Sign in</button>
            <div id="loginError" class="error-text"></div>
            <div style="margin-top: 16px; font-size:12px; text-align:center; color:#aaa;">New? Just create account</div>
        </div>
    </div>

    <!-- MAIN DASHBOARD: users list & chat -->
    <div id="dashboardScreen" class="screen hidden">
        <div class="chat-header">
            <button id="adminBtnHeader" class="logout-icon" style="font-size:22px;">⚙️</button>
            <span class="user-welcome" id="currentUsernameDisplay">User</span>
            <button id="logoutBtnMain" class="logout-icon">🚪</button>
        </div>

        <!-- PEOPLE LIST (active users) -->
        <div id="peopleListContainer" class="people-list">
            <div class="section-title">Active Contacts</div>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- CHAT CONVERSATION VIEW (private chat) -->
    <div id="chatViewScreen" class="screen hidden">
        <div class="chat-header">
            <button id="backToPeopleBtn" class="back-btn">←</button>
            <span id="chatWithName" style="font-weight:600;">Chat</span>
            <div style="width:40px;"></div>
        </div>
        <div class="conversation-view">
            <div id="chatMessagesArea" class="chat-window"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Message...">
                <button id="sendMessageBtn" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <!-- admin drawer -->
    <div id="adminOverlay" class="overlay hidden"></div>
    <div id="adminDrawer" class="admin-drawer hidden">
        <div class="admin-header">👑 Admin Control</div>
        <div id="adminUsersList"></div>
        <div id="adminChatsSection" style="margin-top: 20px;">
            <div style="font-weight:600;">All Private Chats (delete any)</div>
            <div id="adminChatsList"></div>
        </div>
        <button id="closeAdminDrawer" class="btn close-admin" style="background:#aaa;">Close</button>
    </div>
</div>

<script>
    // ------------------- FIREBASE INIT -------------------
    const firebaseConfig = {
        apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
        authDomain: "chatapp-1dabd.firebaseapp.com",
        projectId: "chatapp-1dabd",
        storageBucket: "chatapp-1dabd.firebasestorage.app",
        messagingSenderId: "203806709864",
        appId: "1:203806709864:web:f739450e99bcb5964043dd",
        measurementId: "G-YE19PXXBEZ"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // Global state
    let currentUser = null;       // { username, password, isAdmin }
    let activeChatPartner = null; // username of person we're chatting with
    let currentChatRef = null;    // database reference for messages
    let messageTimeoutIds = new Map(); // store timeouts per messageId

    // Helper: sanitize
    function sanitize(str) { return str.replace(/[.#$[\]]/g, '_'); }

    // User presence: go online/offline
    function setUserOnline(username, isOnline) {
        if (!username) return;
        const userStatusRef = database.ref('users/' + sanitize(username));
        if (isOnline) {
            userStatusRef.update({ username: username, online: true, lastSeen: Date.now() });
            const connRef = database.ref('.info/connected');
            connRef.on('value', (snap) => {
                if (snap.val() === true) {
                    userStatusRef.update({ online: true });
                    userStatusRef.onDisconnect().update({ online: false, lastSeen: Date.now() });
                }
            });
        } else {
            userStatusRef.update({ online: false, lastSeen: Date.now() });
        }
    }

    // Create new user account
    async function registerUser(username, password) {
        const usersRef = database.ref('users/' + sanitize(username));
        const snapshot = await usersRef.once('value');
        if (snapshot.exists()) throw new Error('Username taken');
        if (password.length < 6) throw new Error('Password must be at least 6 digits');
        await usersRef.set({
            username: username,
            password: password,
            online: true,
            isAdmin: (username === 'admin'),   // admin only if admin
            createdAt: Date.now()
        });
        return true;
    }

    // Login logic
    async function loginUser(username, password) {
        const usersRef = database.ref('users');
        const snapshot = await usersRef.once('value');
        const users = snapshot.val();
        if (!users) throw new Error('No users');
        for (let key in users) {
            if (users[key].username === username && users[key].password === password) {
                return { username: username, isAdmin: users[key].isAdmin === true, password: password };
            }
        }
        throw new Error('Invalid credentials');
    }

    // Load active users list (online true)
    function loadActiveUsers() {
        if (!currentUser) return;
        const usersRef = database.ref('users');
        usersRef.on('value', (snapshot) => {
            const users = snapshot.val();
            const activeUsers = [];
            for (let key in users) {
                const u = users[key];
                if (u.username && u.username !== currentUser.username && u.online === true) {
                    activeUsers.push({ username: u.username, online: true });
                }
            }
            renderUsersList(activeUsers);
            if (currentUser.isAdmin) document.getElementById('adminBtnHeader').style.display = 'flex';
            else document.getElementById('adminBtnHeader').style.display = 'none';
        });
    }

    function renderUsersList(users) {
        const container = document.getElementById('usersList');
        if (!container) return;
        if (users.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">No active users</div>';
            return;
        }
        container.innerHTML = users.map(u => `
            <div class="user-item" data-username="${u.username}">
                <div class="avatar">${u.username.charAt(0).toUpperCase()}</div>
                <div class="user-info">
                    <div class="user-name">${escapeHtml(u.username)}</div>
                    <div class="user-status">● Active now</div>
                </div>
            </div>
        `).join('');
        // attach click listeners
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const partner = el.getAttribute('data-username');
                openPrivateChat(partner);
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // open chat with specific user
    function openPrivateChat(partnerUsername) {
        if (!currentUser) return;
        activeChatPartner = partnerUsername;
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('chatViewScreen').classList.remove('hidden');
        document.getElementById('chatWithName').innerText = partnerUsername;
        // load messages
        const chatId = generateChatId(currentUser.username, partnerUsername);
        const messagesRef = database.ref('chats/' + chatId + '/messages');
        if (currentChatRef) currentChatRef.off();
        currentChatRef = messagesRef;
        // clear old timeouts for this chat
        // attach listener
        messagesRef.on('value', (snap) => {
            const msgs = snap.val();
            renderChatMessages(msgs, partnerUsername);
            // Auto-delete after 2 minutes for each new message (already handled on send)
            // But also ensure after load any pending expiry
            if(msgs){
                Object.keys(msgs).forEach(msgId => {
                    const msg = msgs[msgId];
                    if(msg && msg.timestamp && !msg._deleted){
                        const age = Date.now() - msg.timestamp;
                        if(age >= 120000){
                            messagesRef.child(msgId).remove();
                        } else {
                            const remaining = 120000 - age;
                            if(!messageTimeoutIds.has(msgId)){
                                const tid = setTimeout(() => {
                                    messagesRef.child(msgId).remove();
                                    messageTimeoutIds.delete(msgId);
                                }, remaining);
                                messageTimeoutIds.set(msgId, tid);
                            }
                        }
                    }
                });
            }
        });
        // scroll bottom
        setTimeout(() => scrollChatBottom(), 50);
    }

    function generateChatId(userA, userB) {
        let u1 = userA, u2 = userB;
        if (u1 > u2) [u1, u2] = [u2, u1];
        return sanitize(u1) + '_' + sanitize(u2);
    }

    function renderChatMessages(messagesObj, partner) {
        const container = document.getElementById('chatMessagesArea');
        if (!container) return;
        if (!messagesObj) {
            container.innerHTML = '<div style="text-align:center; color:gray;">No messages yet. Say hi!</div>';
            return;
        }
        let messagesArray = Object.keys(messagesObj).map(key => ({ id: key, ...messagesObj[key] }));
        messagesArray.sort((a,b)=> a.timestamp - b.timestamp);
        if(messagesArray.length === 0){
            container.innerHTML = '<div style="text-align:center; color:gray;">No messages yet. Say hi!</div>';
            return;
        }
        container.innerHTML = messagesArray.map(msg => {
            const isSent = msg.sender === currentUser.username;
            return `<div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <div>${escapeHtml(msg.text)}</div>
                        <div class="message-meta">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>`;
        }).join('');
        scrollChatBottom();
    }

    function scrollChatBottom() {
        const area = document.getElementById('chatMessagesArea');
        if(area) area.scrollTop = area.scrollHeight;
    }

    // send message (auto delete after 2 min)
    async function sendMessage(text) {
        if(!text.trim()) return;
        if(!activeChatPartner) return;
        const chatId = generateChatId(currentUser.username, activeChatPartner);
        const messagesRef = database.ref('chats/' + chatId + '/messages');
        const newMsgRef = messagesRef.push();
        const messageObj = {
            text: text.trim(),
            sender: currentUser.username,
            receiver: activeChatPartner,
            timestamp: Date.now(),
        };
        await newMsgRef.set(messageObj);
        // schedule auto deletion after 2 minutes (120000ms)
        const msgId = newMsgRef.key;
        const timeoutId = setTimeout(async () => {
            await newMsgRef.remove();
            messageTimeoutIds.delete(msgId);
        }, 120000);
        messageTimeoutIds.set(msgId, timeoutId);
        document.getElementById('messageInput').value = '';
        scrollChatBottom();
    }

    // ADMIN functions: delete user & all chats, view passwords, delete any chat
    async function adminDeleteUser(targetUsername) {
        if(!currentUser.isAdmin) return;
        if(targetUsername === currentUser.username) { alert("Cannot delete yourself"); return; }
        // remove user from users node
        await database.ref('users/' + sanitize(targetUsername)).remove();
        // find all chat rooms containing this user and delete them
        const chatsRef = database.ref('chats');
        const snapshot = await chatsRef.once('value');
        const chats = snapshot.val();
        if(chats){
            for(let chatId in chats){
                if(chatId.includes(sanitize(targetUsername))){
                    await chatsRef.child(chatId).remove();
                }
            }
        }
        alert(`User ${targetUsername} deleted.`);
        if(activeChatPartner === targetUsername) backToPeople();
    }

    async function adminDeleteChatRoom(chatId) {
        if(!currentUser.isAdmin) return;
        await database.ref('chats/' + chatId).remove();
        alert("Chat room deleted");
        if(activeChatPartner){
            const currentChatId = generateChatId(currentUser.username, activeChatPartner);
            if(currentChatId === chatId){
                backToPeople();
            }
        }
        loadAdminPanel();
    }

    async function loadAdminPanel() {
        if(!currentUser.isAdmin) return;
        // load all users with passwords
        const usersSnap = await database.ref('users').once('value');
        const users = usersSnap.val() || {};
        const userListDiv = document.getElementById('adminUsersList');
        userListDiv.innerHTML = '<div style="font-weight:500;">👥 All Users & passwords</div>';
        for(let key in users){
            const u = users[key];
            if(u.username){
                const row = document.createElement('div');
                row.className = 'user-row';
                row.innerHTML = `<div><strong>${escapeHtml(u.username)}</strong> <span class="admin-pass">pw: ${u.password}</span> ${u.isAdmin ? '👑' : ''}</div>
                                 <div><button class="small-btn delete-user-btn" data-user="${u.username}">Delete user</button></div>`;
                userListDiv.appendChild(row);
            }
        }
        document.querySelectorAll('.delete-user-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const uname = btn.getAttribute('data-user');
                if(confirm(`Delete ${uname} and all their messages?`)) adminDeleteUser(uname);
            });
        });

        // all chat rooms
        const chatsSnap = await database.ref('chats').once('value');
        const chats = chatsSnap.val() || {};
        const chatsDiv = document.getElementById('adminChatsList');
        chatsDiv.innerHTML = '<div style="font-weight:500; margin-top:10px;">🗑️ All Conversations</div>';
        for(let chatId in chats){
            const participants = chatId.replace(/_/g,' & ');
            const msgCount = chats[chatId].messages ? Object.keys(chats[chatId].messages).length : 0;
            const chatElem = document.createElement('div');
            chatElem.className = 'user-row';
            chatElem.innerHTML = `<div><strong>💬 ${participants}</strong> (${msgCount} msgs)</div>
                                  <button class="small-btn delete-chat-btn" data-chat="${chatId}" style="background:#ff8c42;">Delete chat</button>`;
            chatsDiv.appendChild(chatElem);
        }
        document.querySelectorAll('.delete-chat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cid = btn.getAttribute('data-chat');
                if(confirm(`Delete entire conversation?`)) adminDeleteChatRoom(cid);
            });
        });
    }

    function backToPeople() {
        if(currentChatRef) currentChatRef.off();
        currentChatRef = null;
        activeChatPartner = null;
        document.getElementById('chatViewScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        loadActiveUsers();
    }

    function logout() {
        if(currentUser){
            setUserOnline(currentUser.username, false);
        }
        if(currentChatRef) currentChatRef.off();
        currentUser = null;
        activeChatPartner = null;
        messageTimeoutIds.forEach(tid => clearTimeout(tid));
        messageTimeoutIds.clear();
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('chatViewScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').innerText = '';
    }

    // ---------- EVENT LISTENERS ----------
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const pwd = document.getElementById('loginPassword').value.trim();
        if(!username || !pwd) { document.getElementById('loginError').innerText = 'Enter username/password'; return; }
        try {
            let userData;
            try {
                userData = await loginUser(username, pwd);
            } catch(e) {
                // try register if not exists
                await registerUser(username, pwd);
                userData = { username, isAdmin: (username === 'admin'), password: pwd };
            }
            currentUser = userData;
            // set online
            await database.ref('users/' + sanitize(username)).set({ username, password: pwd, online: true, isAdmin: currentUser.isAdmin, lastSeen: Date.now() });
            setUserOnline(username, true);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('currentUsernameDisplay').innerText = username;
            loadActiveUsers();
            // setup admin header
            if(currentUser.isAdmin){
                document.getElementById('adminBtnHeader').style.display = 'flex';
            } else {
                document.getElementById('adminBtnHeader').style.display = 'none';
            }
        } catch(err) {
            document.getElementById('loginError').innerText = err.message;
        }
    });

    document.getElementById('logoutBtnMain').addEventListener('click', logout);
    document.getElementById('backToPeopleBtn').addEventListener('click', backToPeople);
    document.getElementById('sendMessageBtn').addEventListener('click', () => {
        const inp = document.getElementById('messageInput');
        sendMessage(inp.value);
    });
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage(e.target.value);
    });
    // admin drawer
    const adminBtn = document.getElementById('adminBtnHeader');
    const adminDrawer = document.getElementById('adminDrawer');
    const overlay = document.getElementById('adminOverlay');
    adminBtn.addEventListener('click', async () => {
        if(!currentUser.isAdmin) return;
        await loadAdminPanel();
        adminDrawer.classList.remove('hidden');
        overlay.classList.remove('hidden');
    });
    function closeAdmin() {
        adminDrawer.classList.add('hidden');
        overlay.classList.add('hidden');
    }
    document.getElementById('closeAdminDrawer').addEventListener('click', closeAdmin);
    overlay.addEventListener('click', closeAdmin);

    // default accounts: admin/181818 & User27/thewayyou & User09/thewayyou
    window.addEventListener('load', async () => {
        const preset = [
            { username: 'admin', password: '181818', isAdmin: true },
            { username: 'User27', password: 'thewayyou', isAdmin: false },
            { username: 'User09', password: 'thewayyou', isAdmin: false }
        ];
        for(let acc of preset){
            const snap = await database.ref('users/' + sanitize(acc.username)).once('value');
            if(!snap.exists()){
                await database.ref('users/' + sanitize(acc.username)).set({
                    username: acc.username,
                    password: acc.password,
                    isAdmin: acc.isAdmin,
                    online: false,
                });
            }
        }
        console.log('preset accounts ready');
    });
</script>
</body>
</html>
