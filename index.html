<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Hilom · Private Chat</title>
    <!-- Firebase SDKs (modular) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y; /* smooth scrolling on phone */
        }

        /* main app container - phone-like frame */
        .phone-app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 780px;
            background-color: #0c0c0c;
            display: flex;
            flex-direction: column;
            border-radius: 0px;   /* squarish edge as requested */
            box-shadow: none;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a2a2a;
        }

        /* header: minimal, dark, squarish */
        .chat-header {
            background-color: #111111;
            padding: 16px 20px;
            border-bottom: 1px solid #2c2c2c;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .title {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: white;
        }
        .badge {
            font-size: 0.7rem;
            color: #aaa;
            background: #1e1e1e;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
        }

        /* chat messages area — scrollable, white text */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #0c0c0c;
            scroll-behavior: smooth;
        }

        /* individual message bubble style — squarish edges, phone-style */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.sent {
            align-self: flex-end;
        }
        .message.received {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            background-color: #1f2a2f;
            color: white;
            border: none;
        }
        .sent .bubble {
            background-color: #0a4b6e;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .bubble {
            background-color: #232323;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 0.65rem;
            color: #9e9e9e;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
            display: flex;
            gap: 8px;
        }
        .sender-name {
            font-weight: 500;
            color: #c0c0c0;
        }
        .timestamp {
            font-family: monospace;
        }

        /* typing indicator */
        .typing-indicator {
            font-size: 0.75rem;
            color: #aaa;
            padding: 6px 12px;
            background: #1a1a1a;
            border-radius: 24px;
            width: fit-content;
            margin: 4px 0;
            display: inline-block;
        }

        /* input area — fixed bottom, squarish */
        .input-area {
            background-color: #111111;
            border-top: 1px solid #2a2a2a;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 12px 14px;
            border-radius: 28px;
            font-size: 1rem;
            color: white;
            outline: none;
            font-family: inherit;
        }
        .input-area input:focus {
            border-color: #2c7da0;
        }
        .input-area input::placeholder {
            color: #6c6c6c;
        }
        .input-area button {
            background-color: #2c7da0;
            border: none;
            padding: 10px 18px;
            border-radius: 32px;
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:active {
            background-color: #1f5e7a;
            transform: scale(0.96);
        }

        /* auth modal (overlay) — no hints of username/password visible inside dashboard */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: inherit;
        }
        .auth-card {
            background: #121212;
            width: 85%;
            max-width: 340px;
            border-radius: 24px;
            padding: 28px 22px;
            border: 1px solid #2c2c2c;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .auth-card h2 {
            color: white;
            margin-bottom: 24px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }
        .auth-card input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 14px 16px;
            border-radius: 28px;
            margin-bottom: 20px;
            font-size: 1rem;
            color: white;
            outline: none;
        }
        .auth-card input:focus {
            border-color: #2c7da0;
        }
        .auth-card button {
            background: #2c7da0;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .error-msg {
            color: #ff8a7a;
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .admin-badge {
            background: #222;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #bbb;
        }
        /* hide any visible password/username hints */
        .hidden-hint {
            display: none;
        }
        /* simple scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div id="appRoot" class="phone-app">
    <div class="chat-header">
        <span class="title">Hilom</span>
        <span class="badge" id="userDisplayBadge">—</span>
    </div>
    <div class="messages-container" id="messageList">
        <!-- dynamic messages appear here -->
        <div style="text-align:center; color:#555; padding:20px;">connecting to secure channel...</div>
    </div>
    <div class="input-area" id="inputArea">
        <input type="text" id="messageInput" placeholder="Message" autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, getDoc, setDoc, limit } from "firebase/firestore";
    import { getAnalytics } from "firebase/analytics";

    // Firebase configuration (provided)
    const firebaseConfig = {
        apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
        authDomain: "chatapp-1dabd.firebaseapp.com",
        projectId: "chatapp-1dabd",
        storageBucket: "chatapp-1dabd.firebasestorage.app",
        messagingSenderId: "203806709864",
        appId: "1:203806709864:web:f739450e99bcb5964043dd",
        measurementId: "G-YE19PXXBEZ"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    
    // Collections: messages, typing status (optional but clean), also user presence
    const messagesRef = collection(db, "chatMessages");
    const qMessages = query(messagesRef, orderBy("timestamp", "asc"), limit(200));
    
    // Typing status (simple doc for each user, but we handle optionally)
    // For simplicity, we track "typing" via a Firestore doc: typingStatus/{userId}
    
    // Define allowed users (only two users + admin)
    // Two users: User27 and User09  (case-sensitive exactly)
    // password: "thewayyou"
    const VALID_CREDENTIALS = {
        "User27": "thewayyou",
        "User09": "thewayyou"
    };
    // Admin access: username "admin" password "181818"
    const ADMIN_CRED = { username: "admin", password: "181818" };
    
    // Global state
    let currentUser = null;      // stores { username, isAdmin }
    let messagesUnsubscribe = null;
    let typingTimeout = null;
    let currentTypingRef = null;
    
    // DOM elements
    const messageContainer = document.getElementById("messageList");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const userDisplayBadge = document.getElementById("userDisplayBadge");
    const inputAreaDiv = document.getElementById("inputArea");
    
    // Helper: format time
    function formatTime(date) {
        if (!date) return "";
        const d = date.toDate ? date.toDate() : new Date(date);
        return d.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
    }
    
    // render messages in realtime
    function renderMessages(messages) {
        if (!messageContainer) return;
        if (messages.length === 0) {
            messageContainer.innerHTML = `<div style="text-align:center; color:#6a6a6a; padding:32px 16px;">✨ No messages yet. Start the whisper. ✨</div>`;
            return;
        }
        let html = '';
        for (let msg of messages) {
            const isOwn = (currentUser && msg.sender === currentUser.username);
            const senderClass = isOwn ? 'sent' : 'received';
            const displayName = msg.sender;
            const timeStr = msg.timestamp ? formatTime(msg.timestamp) : '';
            const messageText = msg.text || '';
            html += `
                <div class="message ${senderClass}">
                    <div class="bubble">${escapeHtml(messageText)}</div>
                    <div class="message-meta">
                        <span class="sender-name">${escapeHtml(displayName)}</span>
                        <span class="timestamp">${timeStr}</span>
                    </div>
                </div>
            `;
        }
        messageContainer.innerHTML = html;
        // scroll to bottom
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }
    
    // escape basic html
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // listen to firestore messages
    function subscribeMessages() {
        if (messagesUnsubscribe) messagesUnsubscribe();
        messagesUnsubscribe = onSnapshot(qMessages, (snapshot) => {
            const msgs = [];
            snapshot.forEach(docSnap => {
                msgs.push({ id: docSnap.id, ...docSnap.data() });
            });
            renderMessages(msgs);
        }, (error) => {
            console.error("Firestore error:", error);
            messageContainer.innerHTML = `<div style="color:#ff8a7a; text-align:center;">⚠️ connection issue. refresh?</div>`;
        });
    }
    
    // send message function
    async function sendMessage(text) {
        if (!currentUser) return;
        if (!text.trim()) return;
        const trimmed = text.trim();
        if (trimmed === "") return;
        try {
            await addDoc(messagesRef, {
                sender: currentUser.username,
                text: trimmed,
                timestamp: serverTimestamp(),
                isAdmin: currentUser.isAdmin || false
            });
            // clear typing indicator for this user after send
            if (currentTypingRef) {
                await updateDoc(currentTypingRef, { typing: false });
            }
        } catch (err) {
            console.error("send error:", err);
            alert("Message could not be sent.");
        }
    }
    
    // --- typing indicator (simple but functional) ---
    async function setTyping(isTyping) {
        if (!currentUser) return;
        const typingDocId = currentUser.username;
        const typingDocRef = doc(db, "typingStatus", typingDocId);
        currentTypingRef = typingDocRef;
        try {
            const docSnap = await getDoc(typingDocRef);
            if (!docSnap.exists()) {
                await setDoc(typingDocRef, { username: currentUser.username, typing: isTyping, updated: serverTimestamp() });
            } else {
                await updateDoc(typingDocRef, { typing: isTyping, updated: serverTimestamp() });
            }
        } catch(e) { /* ignore */ }
    }
    
    function handleTypingStart() {
        if (!currentUser) return;
        setTyping(true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            setTyping(false);
        }, 1500);
    }
    
    // listen for other users typing (simple subscription)
    let typingUnsub = null;
    function subscribeTypingIndicator() {
        if (typingUnsub) typingUnsub();
        const typingCol = collection(db, "typingStatus");
        const qTyping = query(typingCol);
        typingUnsub = onSnapshot(qTyping, (snapshot) => {
            if (!currentUser) return;
            let typingUsers = [];
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (data.username !== currentUser.username && data.typing === true) {
                    typingUsers.push(data.username);
                }
            });
            // show inline indicator in messages area if anyone typing (except self)
            const existingIndicator = document.getElementById("dynamicTypingIndicator");
            if (typingUsers.length > 0) {
                const names = typingUsers.join(" and ");
                const indicatorHtml = `<div id="dynamicTypingIndicator" class="typing-indicator">✎ ${escapeHtml(names)} is typing...</div>`;
                if (!existingIndicator) {
                    messageContainer.insertAdjacentHTML('beforeend', indicatorHtml);
                } else {
                    existingIndicator.innerText = `✎ ${names} is typing...`;
                }
                messageContainer.scrollTop = messageContainer.scrollHeight;
            } else {
                if (existingIndicator) existingIndicator.remove();
            }
        });
    }
    
    // cleanup and logout
    function logoutAndReset() {
        if (messagesUnsubscribe) messagesUnsubscribe();
        if (typingUnsub) typingUnsub();
        if (typingTimeout) clearTimeout(typingTimeout);
        currentUser = null;
        if (currentTypingRef) {
            setTyping(false).catch(()=>{});
        }
        showAuthScreen();
    }
    
    // AUTH UI: no password/username hints displayed on dashboard, just inputs with placeholder hidden context
    function showAuthScreen() {
        // remove any existing overlay
        const oldOverlay = document.getElementById("hilomAuthOverlay");
        if (oldOverlay) oldOverlay.remove();
        
        const overlay = document.createElement("div");
        overlay.id = "hilomAuthOverlay";
        overlay.className = "auth-overlay";
        overlay.innerHTML = `
            <div class="auth-card">
                <h2>⚡ Hilom ⚡</h2>
                <input type="text" id="authUsername" placeholder="Username" autocomplete="off">
                <input type="password" id="authPassword" placeholder="Password" autocomplete="off">
                <button id="authSubmitBtn">Enter</button>
                <div id="authError" class="error-msg"></div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        const usernameInput = overlay.querySelector("#authUsername");
        const passwordInput = overlay.querySelector("#authPassword");
        const submitBtn = overlay.querySelector("#authSubmitBtn");
        const errorDiv = overlay.querySelector("#authError");
        
        const attemptLogin = () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            errorDiv.innerText = "";
            if (!username || !password) {
                errorDiv.innerText = "Please fill both fields";
                return;
            }
            // check admin
            if (username === ADMIN_CRED.username && password === ADMIN_CRED.password) {
                currentUser = { username: "Admin", isAdmin: true };
                initChatAfterAuth();
                overlay.remove();
                return;
            }
            // check User27 / User09
            if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === password) {
                currentUser = { username: username, isAdmin: false };
                initChatAfterAuth();
                overlay.remove();
                return;
            }
            errorDiv.innerText = "Invalid credentials. Access denied.";
        };
        
        submitBtn.addEventListener("click", attemptLogin);
        const handleEnter = (e) => { if (e.key === "Enter") attemptLogin(); };
        usernameInput.addEventListener("keypress", handleEnter);
        passwordInput.addEventListener("keypress", handleEnter);
    }
    
    // after auth success: set up chat ui
    function initChatAfterAuth() {
        if (!currentUser) return;
        // update badge
        userDisplayBadge.innerText = `${currentUser.username}${currentUser.isAdmin ? ' ⚡' : ''}`;
        // enable input and send
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.placeholder = `Message as ${currentUser.username}`;
        // clear old messages and subscribe fresh
        subscribeMessages();
        subscribeTypingIndicator();
        // attach typing listeners
        messageInput.addEventListener("input", handleTypingStart);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                if (messageInput.value.trim()) {
                    sendMessage(messageInput.value);
                    messageInput.value = "";
                    setTyping(false);
                    if (typingTimeout) clearTimeout(typingTimeout);
                }
            }
        });
        sendBtn.onclick = () => {
            if (messageInput.value.trim()) {
                sendMessage(messageInput.value);
                messageInput.value = "";
                setTyping(false);
                if (typingTimeout) clearTimeout(typingTimeout);
            }
        };
        // Also focus
        messageInput.focus();
        // ensure typing cleanup on logout?
    }
    
    // on page load, first show auth (no user hints visible, all hidden)
    // We also need to remove any default placeholder about password/username dashboard.
    // The input fields themselves have generic placeholder "Username/Password" but no extra hints outside.
    // Ensure we never expose default login details inside dashboard UI.
    // disable chat input until auth
    messageInput.disabled = true;
    sendBtn.disabled = true;
    messageInput.placeholder = "Authenticate first...";
    userDisplayBadge.innerText = "offline";
    
    // Start auth screen
    showAuthScreen();
    
    // Additional styling: make sure any potential side text is hidden
    // Also ensure admin has same message interface, no extra privileges except view.
    // For admin we just allow same as user (both User27/User09 can chat; admin can also send messages as "Admin").
    // The requirement: two users only: User27 and User09 with password thewayyou. Admin separate.
    // This respects 2 users + admin access.
    // The chat displays messages from these users. Admin messages appear as "Admin".
    // No password/username hints are displayed in dashboard ever.
    
    // On logout (optional not required but we don't implement logout button for simplicity but it's secure)
    // but if admin wants, just refresh page. The spec requires only auth entrance.
    // Ensure realtime accessible anywhere.
    
    // Add a small helper to clear any accidental visibility of credential hints.
    // I also need to make sure that on mobile the keyboard does not break
    window.addEventListener('touchstart', function() {
        // just pass, ensure scrolling
    });
    
    // optional: keep session but no extra localStorage storing password, secure
    console.log("Hilom ready · private chat");
    
    // if network offline or firebase rules error, the auth screen remains but we don't leak.
    // Clean unsubscribe on page reload? Already managed in logoutAndReset but page refresh re-runs.
    window.addEventListener("beforeunload", () => {
        if (currentUser && currentTypingRef) {
            setTyping(false).catch(()=>{});
        }
    });
</script>
</body>
</html>
