<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Firebase Messenger v2</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    // CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
      authDomain: "chatapp-1dabd.firebaseapp.com",
      projectId: "chatapp-1dabd",
      storageBucket: "chatapp-1dabd.firebasestorage.app",
      messagingSenderId: "203806709864",
      appId: "1:203806709864:web:f739450e99bcb5964043dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let currentChatId = null;

    // ---------- AUTH ----------
    window.signup = async () => {
      const email = em.value;
      const pass = pw.value;

      const res = await createUserWithEmailAndPassword(auth, email, pass);

      await setDoc(doc(db, "users", res.user.uid), {
        email,
        online: true,
        lastSeen: Date.now()
      });

      alert("Account created");
    };

    window.login = async () => {
      await signInWithEmailAndPassword(auth, em.value, pw.value);
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      currentUser = user;

      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        online: true,
        lastSeen: Date.now()
      }, { merge: true });

      heartbeat();
      loadUsers();
      showApp();
    });

    // ---------- PRESENCE ----------
    function heartbeat() {
      setInterval(async () => {
        if (!currentUser) return;

        await updateDoc(doc(db, "users", currentUser.uid), {
          lastSeen: Date.now(),
          online: true
        });
      }, 5000);
    }

    // ---------- USERS ----------
    function loadUsers() {
      onSnapshot(collection(db, "users"), snap => {
        users.innerHTML = "";
        snap.forEach(u => {
          if (u.id === currentUser.uid) return;

          const data = u.data();
          const div = document.createElement("div");

          div.innerHTML = `
            <b>${data.email}</b>
            <br>${data.online ? "🟢 online" : "⚫ offline"}
            <button onclick="openChat('${u.id}')">Chat</button>
          `;

          users.appendChild(div);
        });
      });
    }

    // ---------- CHAT ID ----------
    function getChatId(uid1, uid2) {
      return [uid1, uid2].sort().join("_");
    }

    window.openChat = (uid) => {
      currentChatId = getChatId(currentUser.uid, uid);
      listenChat();
    };

    // ---------- CHAT ----------
    function listenChat() {
      const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("time"));

      onSnapshot(q, snap => {
        chat.innerHTML = "";

        snap.forEach(d => {
          const m = d.data();

          const msg = document.createElement("div");
          msg.innerHTML = `
            <b>${m.senderEmail}</b><br>
            ${m.text || ""}
            ${m.image ? `<br><img src="${m.image}" width="150">` : ""}
          `;

          chat.appendChild(msg);
        });
      });
    }

    window.send = async () => {
      if (!currentChatId) return;

      await addDoc(collection(db, "chats", currentChatId, "messages"), {
        text: msg.value,
        senderId: currentUser.uid,
        senderEmail: currentUser.email,
        time: Date.now(),
        read: false
      });

      msg.value = "";
      notify("New message sent");
    };

    // ---------- IMAGE SEND ----------
    window.sendImage = async (file) => {
      const fileRef = ref(storage, "chat/" + Date.now());

      await uploadBytes(fileRef, file);
      const url = await getDownloadURL(fileRef);

      await addDoc(collection(db, "chats", currentChatId, "messages"), {
        image: url,
        senderId: currentUser.uid,
        senderEmail: currentUser.email,
        time: Date.now(),
        read: false
      });
    };

    // ---------- NOTIFICATIONS ----------
    function notify(text) {
      if (!("Notification" in window)) return;

      if (Notification.permission === "granted") {
        new Notification(text);
      }
    }

    Notification.requestPermission();

    // ---------- UI ----------
    function showApp() {
      authBox.style.display = "none";
      appBox.style.display = "flex";
    }
  </script>

  <style>
    body { font-family: Arial; margin:0; }
    #appBox { display:none; flex-direction:row; }
    #users { width:30%; border-right:1px solid #ccc; padding:10px; }
    #chat { width:70%; padding:10px; }
  </style>
</head>

<body>

<div id="authBox">
  <h2>Login</h2>
  <input id="em" placeholder="email">
  <input id="pw" type="password" placeholder="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="appBox">
  <div id="users"></div>

  <div id="chat">
    <div id="chat"></div>

    <input id="msg">
    <button onclick="send()">Send</button>

    <input type="file" onchange="sendImage(this.files[0])">
  </div>
</div>

</body>
</html>
