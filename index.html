<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>Hilom · Private Messenger</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Phone container */
        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Squarish edges */
        .chat-header, .auth-header, .admin-header, .chat-room-header {
            background-color: #1a1a1a;
            padding: 16px 18px;
            border-bottom: 1px solid #2c2c2c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-shrink: 0;
        }

        .chat-header h2, .auth-header h2, .chat-room-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .users-list-panel {
            background-color: #121212;
            padding: 12px 16px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #2a2a2a;
            touch-action: manipulation;
        }

        .user-card:active {
            background: #2a2a2a;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            color: white;
            font-weight: 500;
            font-size: 1rem;
        }

        .user-status {
            font-size: 0.7rem;
            color: #9ca3af;
        }

        .online-badge {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .offline-badge {
            background-color: #6b7280;
        }

        .unread-badge {
            background-color: #3b82f6;
            color: white;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Chat room specific */
        .chat-room-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            word-wrap: break-word;
            background-color: #1f2a3a;
            color: white;
            align-self: flex-start;
        }

        .message-bubble.own {
            background-color: #0e4a6b;
            align-self: flex-end;
        }

        .message-meta {
            font-size: 0.65rem;
            color: #aaa;
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }

        .message-status {
            font-size: 0.6rem;
            color: #6b7280;
            margin-top: 4px;
            text-align: right;
        }

        .typing-indicator {
            font-size: 0.75rem;
            color: #9ca3af;
            padding: 6px 16px;
            font-style: italic;
            background: #0a0a0a;
            flex-shrink: 0;
        }

        .chat-input-area {
            background-color: #111;
            border-top: 1px solid #2a2a2a;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input-area input {
            flex: 1;
            background: #1e1e1e;
            border: none;
            padding: 14px 16px;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .chat-input-area button {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            touch-action: manipulation;
        }

        .emoji-btn {
            background: #1e1e1e;
            padding: 12px 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .auth-container {
            background: #0f0f0f;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            justify-content: center;
        }

        .auth-card {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-card input {
            background: #2a2a2a;
            border: none;
            padding: 16px 20px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }

        .auth-card button {
            background: #2563eb;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            color: white;
            font-size: 1rem;
        }

        .switch-auth {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .switch-auth span {
            color: #3b82f6;
            cursor: pointer;
        }

        .admin-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .admin-btn {
            background: #2d3748;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            color: white;
            font-size: 0.8rem;
        }

        .danger-btn {
            background: #991b1b;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #4b5563;
            padding: 8px;
        }

        input::placeholder {
            color: #6b7280;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW71xwMV6DS6ggu-Q-TXX8OeKW-aWUKuY",
        authDomain: "chatapp-1dabd.firebaseapp.com",
        projectId: "chatapp-1dabd",
        storageBucket: "chatapp-1dabd.firebasestorage.app",
        messagingSenderId: "203806709864",
        appId: "1:203806709864:web:f739450e99bcb5964043dd",
        measurementId: "G-YE19PXXBEZ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(e => console.warn(e));

    // Default users
    const DEFAULT_USERS = [
        { username: "User27", password: "thewayyou" },
        { username: "User09", password: "thewayyou" }
    ];

    async function seedDefaultUsers() {
        const usersRef = db.collection("users");
        for (let u of DEFAULT_USERS) {
            const doc = await usersRef.doc(u.username).get();
            if (!doc.exists) {
                await usersRef.doc(u.username).set({ username: u.username, password: u.password, isAdmin: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            } else {
                await usersRef.doc(u.username).update({ password: u.password });
            }
        }
        const adminDoc = await usersRef.doc("admin").get();
        if (!adminDoc.exists) {
            await usersRef.doc("admin").set({ username: "admin", password: "181818", isAdmin: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await usersRef.doc("admin").update({ password: "181818", isAdmin: true });
        }
    }
    seedDefaultUsers();

    let currentUser = null;
    let heartbeatInterval = null;
    const appDiv = document.getElementById("app");

    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }) || ''; }

    function getChatRoomId(u1, u2) { return [u1, u2].sort().join("_"); }

    // Update presence
    async function updatePresence() {
        if (!currentUser) return;
        await db.collection("presence").doc(currentUser.username).set({
            username: currentUser.username,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
            online: true
        }, { merge: true });
    }

    // Get all users (including offline) with last seen & unread counts
    async function getAllUsersWithStatus() {
        const usersSnap = await db.collection("users").get();
        const presenceSnap = await db.collection("presence").get();
        const presenceMap = {};
        presenceSnap.forEach(doc => { presenceMap[doc.id] = doc.data(); });
        
        const users = [];
        for (const userDoc of usersSnap.docs) {
            const data = userDoc.data();
            if (data.username === currentUser?.username) continue;
            const presence = presenceMap[data.username] || { online: false, lastSeen: null };
            let lastSeenDate = presence.lastSeen?.toDate() || new Date(0);
            let minsAgo = Math.floor((new Date() - lastSeenDate) / 60000);
            let statusText = presence.online ? (minsAgo < 2 ? "active now" : `active ${minsAgo}m ago`) : (minsAgo > 0 ? `offline ${minsAgo}m ago` : "offline");
            
            // Count unread messages for this user
            const roomId = getChatRoomId(currentUser.username, data.username);
            const unreadQuery = await db.collection("chats").doc(roomId).collection("messages")
                .where("receiver", "==", currentUser.username)
                .where("read", "==", false)
                .get();
            const unreadCount = unreadQuery.size;
            
            users.push({ 
                username: data.username, 
                isAdmin: data.isAdmin || false,
                online: presence.online,
                status: statusText,
                unreadCount: unreadCount,
                lastSeen: lastSeenDate
            });
        }
        // ensure admin appears even if not in presence
        if (!users.find(u => u.username === "admin")) {
            users.push({ username: "admin", isAdmin: true, online: true, status: "active now", unreadCount: 0 });
        }
        users.sort((a,b) => b.online - a.online);
        return users;
    }

    // Render main user list (dashboard)
    async function renderUserListDashboard() {
        if (!currentUser) return renderAuth();
        
        const users = await getAllUsersWithStatus();
        appDiv.innerHTML = `
            <div class="chat-header">
                <h2>Hilom</h2>
                <div>
                    <span style="font-size:0.8rem;">${escapeHtml(currentUser.username)}</span>
                    <button id="logoutBtn" style="background:none; border:none; color:gray; margin-left:12px; font-size:1.2rem;"><i class="fas fa-sign-out-alt"></i></button>
                    ${currentUser.isAdmin ? '<button id="adminPanelBtn" style="background:none; border:none; color:#facc15; margin-left:8px; font-size:1.2rem;"><i class="fas fa-user-shield"></i></button>' : ''}
                </div>
            </div>
            <div class="users-list-panel" id="usersListContainer">
                ${users.map(u => `
                    <div class="user-card" data-user="${escapeHtml(u.username)}">
                        <div class="user-info">
                            <div class="user-name">
                                <span class="online-badge ${u.online ? '' : 'offline-badge'}"></span>
                                ${escapeHtml(u.username)} ${u.isAdmin ? '👑' : ''}
                            </div>
                            <div class="user-status">${escapeHtml(u.status)}</div>
                        </div>
                        ${u.unreadCount > 0 ? `<div class="unread-badge">${u.unreadCount}</div>` : ''}
                    </div>
                `).join('')}
            </div>
            <div class="footer-note">Tap any user to chat privately • Messages disappear 2 mins after being read</div>
        `;
        
        document.getElementById("logoutBtn").onclick = async () => {
            if (currentUser) await db.collection("presence").doc(currentUser.username).set({ online: false });
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            currentUser = null;
            localStorage.removeItem("hilom_user");
            renderAuth();
        };
        if (currentUser.isAdmin) {
            document.getElementById("adminPanelBtn").onclick = () => renderAdminDashboard();
        }
        document.querySelectorAll('.user-card').forEach(card => {
            card.addEventListener('click', () => {
                const partner = card.getAttribute('data-user');
                if (partner) openChatRoom(partner);
            });
        });
        
        // Heartbeat
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => updatePresence(), 15000);
        updatePresence();
    }

    // Open dedicated chat room interface
    let currentChatPartner = null;
    let unsubscribeMessages = null;
    let typingTimeout = null;
    let typingListenerUnsub = null;

    async function openChatRoom(partnerUsername) {
        if (!currentUser) return;
        currentChatPartner = partnerUsername;
        
        // Mark messages as read (they will be deleted after 2 mins of being read)
        const roomId = getChatRoomId(currentUser.username, partnerUsername);
        const messagesRef = db.collection("chats").doc(roomId).collection("messages");
        const unreadSnapshot = await messagesRef.where("receiver", "==", currentUser.username).where("read", "==", false).get();
        
        for (const doc of unreadSnapshot.docs) {
            await doc.ref.update({ read: true, readAt: firebase.firestore.FieldValue.serverTimestamp() });
            // Schedule deletion 2 minutes after being marked as read
            setTimeout(async () => {
                const stillExists = await messagesRef.doc(doc.id).get();
                if (stillExists.exists) await messagesRef.doc(doc.id).delete();
            }, 120000);
        }
        
        renderChatRoomUI(partnerUsername);
        setupChatListeners(partnerUsername);
    }
    
    function renderChatRoomUI(partner) {
        appDiv.innerHTML = `
            <div class="chat-room-container">
                <div class="chat-room-header">
                    <div style="display: flex; align-items: center;">
                        <button id="backToUsersBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
                        <h3>${escapeHtml(partner)}</h3>
                    </div>
                    <div></div>
                </div>
                <div id="chatMessagesArea" class="chat-messages-area">
                    <div style="text-align:center; color:#6b7280; padding:20px;">Loading messages...</div>
                </div>
                <div id="typingStatus" class="typing-indicator"></div>
                <div class="chat-input-area">
                    <button id="emojiButton" class="emoji-btn"><i class="far fa-smile-wink"></i></button>
                    <input type="text" id="messageInput" placeholder="Message..." autocomplete="off">
                    <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        
        document.getElementById("backToUsersBtn").onclick = () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (typingListenerUnsub) typingListenerUnsub();
            currentChatPartner = null;
            renderUserListDashboard();
        };
        
        const sendBtn = document.getElementById("sendMsgBtn");
        const msgInput = document.getElementById("messageInput");
        
        const sendMessage = async () => {
            const text = msgInput.value.trim();
            if (!text || !currentChatPartner) return;
            const roomId = getChatRoomId(currentUser.username, currentChatPartner);
            const messagesRef = db.collection("chats").doc(roomId).collection("messages");
            const newMsg = {
                sender: currentUser.username,
                receiver: currentChatPartner,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                read: false,
                createdAt: Date.now()
            };
            await messagesRef.add(newMsg);
            msgInput.value = "";
            setTyping(false);
            if (typingTimeout) clearTimeout(typingTimeout);
        };
        
        sendBtn.onclick = sendMessage;
        msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
        
        // Typing events
        msgInput.addEventListener("input", () => {
            if (currentChatPartner) {
                setTyping(true);
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => setTyping(false), 1500);
            }
        });
        
        document.getElementById("emojiButton").onclick = () => {
            const emoji = prompt("Choose emoji:", "😊❤️🔥👍");
            if (emoji && msgInput) msgInput.value += emoji;
        };
    }
    
    async function setTyping(typing) {
        if (!currentChatPartner || !currentUser) return;
        const typingRef = db.collection("typing").doc(`${currentUser.username}_${currentChatPartner}`);
        if (typing) {
            await typingRef.set({ user: currentUser.username, typing: true, updated: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await typingRef.set({ user: currentUser.username, typing: false });
        }
    }
    
    function setupChatListeners(partner) {
        if (unsubscribeMessages) unsubscribeMessages();
        if (typingListenerUnsub) typingListenerUnsub();
        
        const roomId = getChatRoomId(currentUser.username, partner);
        const messagesRef = db.collection("chats").doc(roomId).collection("messages");
        
        // Real-time messages
        unsubscribeMessages = messagesRef.orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const container = document.getElementById("chatMessagesArea");
            if (!container) return;
            const messages = [];
            snapshot.forEach(doc => {
                messages.push({ id: doc.id, ...doc.data() });
            });
            
            if (messages.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#6b7280; padding:20px;">✨ No messages yet. Say hi! ✨</div>`;
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isOwn = msg.sender === currentUser.username;
                const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "now";
                const readStatus = !isOwn && msg.read ? "✓ Read" : (isOwn && msg.read ? "✓ Read" : (isOwn ? "✓ Sent" : ""));
                return `
                    <div class="message-bubble ${isOwn ? 'own' : ''}">
                        <div class="message-meta">
                            <span>${escapeHtml(msg.sender)}</span>
                            <span>${time}</span>
                        </div>
                        <div>${escapeHtml(msg.text)}</div>
                        ${readStatus ? `<div class="message-status">${readStatus}</div>` : ''}
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
            
            // Auto-mark received messages as read if this chat is open and user is the receiver
            messages.forEach(async (msg) => {
                if (!msg.read && msg.receiver === currentUser.username && msg.sender !== currentUser.username) {
                    await messagesRef.doc(msg.id).update({ read: true, readAt: firebase.firestore.FieldValue.serverTimestamp() });
                    // Schedule deletion 2 minutes after read
                    setTimeout(async () => {
                        const docExists = await messagesRef.doc(msg.id).get();
                        if (docExists.exists) await messagesRef.doc(msg.id).delete();
                    }, 120000);
                }
            });
        });
        
        // Typing listener
        const typingRef = db.collection("typing").doc(`${partner}_${currentUser.username}`);
        typingListenerUnsub = typingRef.onSnapshot(doc => {
            const data = doc.data();
            const typingDiv = document.getElementById("typingStatus");
            if (typingDiv && data && data.typing === true && data.user === partner) {
                typingDiv.innerText = `${partner} is typing...`;
            } else if (typingDiv) {
                typingDiv.innerText = "";
            }
        });
    }
    
    // Admin panel
    async function renderAdminDashboard() {
        if (!currentUser?.isAdmin) return renderUserListDashboard();
        const usersSnap = await db.collection("users").get();
        const allUsers = [];
        usersSnap.forEach(doc => allUsers.push(doc.data()));
        
        appDiv.innerHTML = `
            <div class="chat-header" style="justify-content: space-between;">
                <button id="backToChat" class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <h2>Admin Panel</h2>
                <div></div>
            </div>
            <div style="padding:16px; overflow-y:auto; flex:1;">
                <h3 style="color:white;">Manage Users</h3>
                <div class="admin-buttons">
                    <button id="addUserBtn" class="admin-btn"><i class="fas fa-user-plus"></i> Add User</button>
                    <button id="resetPassBtn" class="admin-btn warning-btn"><i class="fas fa-key"></i> Reset Password</button>
                    <button id="deleteUserBtn" class="admin-btn danger-btn"><i class="fas fa-user-minus"></i> Remove User</button>
                    <button id="deleteAllChatsBtn" class="admin-btn danger-btn"><i class="fas fa-trash-alt"></i> Delete All Chats</button>
                </div>
                <div class="user-list" style="background:#171717; border-radius:20px; padding:12px; margin-top:16px;">
                    ${allUsers.map(u => `<div style="padding:10px; border-bottom:1px solid #2c2c2c; color:white;">${escapeHtml(u.username)} ${u.isAdmin ? '👑' : ''}</div>`).join('')}
                </div>
                <div style="margin-top: 30px;">
                    <button id="adminDeleteOwnAccount" class="admin-btn danger-btn"><i class="fas fa-user-slash"></i> Delete My Account</button>
                </div>
            </div>
        `;
        document.getElementById("backToChat").onclick = () => renderUserListDashboard();
        document.getElementById("addUserBtn").onclick = async () => {
            const nu = prompt("New username:");
            if (!nu) return;
            const pw = prompt("Password:");
            if (!pw) return;
            await db.collection("users").doc(nu).set({ username: nu, password: pw, isAdmin: false });
            alert("User added");
            renderAdminDashboard();
        };
        document.getElementById("resetPassBtn").onclick = async () => {
            const un = prompt("Username:");
            if (!un) return;
            const np = prompt("New password:");
            if (np) await db.collection("users").doc(un).update({ password: np });
            alert("Updated");
        };
        document.getElementById("deleteUserBtn").onclick = async () => {
            const un = prompt("Username to delete:");
            if (un && un !== currentUser.username) {
                await db.collection("users").doc(un).delete();
                await db.collection("presence").doc(un).delete();
                alert("Removed");
                renderAdminDashboard();
            } else alert("Cannot delete self");
        };
        document.getElementById("deleteAllChatsBtn").onclick = async () => {
            if (confirm("Delete all chat messages?")) {
                const chats = await db.collection("chats").get();
                for (const chat of chats.docs) {
                    const msgs = await db.collection("chats").doc(chat.id).collection("messages").get();
                    for (const m of msgs.docs) await m.ref.delete();
                    await chat.ref.delete();
                }
                alert("All chats cleared");
            }
        };
        document.getElementById("adminDeleteOwnAccount").onclick = async () => {
            if (confirm("Delete your account?")) {
                await db.collection("users").doc(currentUser.username).delete();
                await db.collection("presence").doc(currentUser.username).delete();
                currentUser = null;
                localStorage.removeItem("hilom_user");
                renderAuth();
            }
        };
    }
    
    // Auth
    async function handleLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!username || !password) return alert("Enter credentials");
        const userDoc = await db.collection("users").doc(username).get();
        if (!userDoc.exists) return alert("User not found");
        const data = userDoc.data();
        if (data.password !== password) return alert("Wrong password");
        currentUser = { username: data.username, isAdmin: data.isAdmin || false };
        localStorage.setItem("hilom_user", JSON.stringify({ username: currentUser.username, isAdmin: currentUser.isAdmin }));
        await updatePresence();
        renderUserListDashboard();
    }
    
    async function handleSignup() {
        const username = document.getElementById("signupUsername").value.trim();
        const password = document.getElementById("signupPassword").value.trim();
        if (!username || !password) return alert("Fill all fields");
        const exists = await db.collection("users").doc(username).get();
        if (exists.exists) return alert("Username taken");
        await db.collection("users").doc(username).set({ username, password, isAdmin: false });
        alert("Account created! Please login.");
        renderAuth();
    }
    
    function renderAuth() {
        appDiv.innerHTML = `
            <div class="auth-container">
                <div class="auth-header" style="background:transparent; justify-content:center;">
                    <h2>Hilom</h2>
                </div>
                <div class="auth-card">
                    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
                    <button id="loginBtn">Log in</button>
                    <div class="switch-auth">No account? <span id="showSignup">Create account</span></div>
                </div>
                <div class="footer-note">private · offline messages · read receipts</div>
            </div>
        `;
        document.getElementById("loginBtn").onclick = handleLogin;
        document.getElementById("showSignup").onclick = () => {
            appDiv.innerHTML = `
                <div class="auth-container">
                    <div class="auth-header"><button class="back-btn" id="backToLogin"><i class="fas fa-arrow-left"></i></button><h2>Sign up</h2></div>
                    <div class="auth-card">
                        <input type="text" id="signupUsername" placeholder="Username">
                        <input type="password" id="signupPassword" placeholder="Password">
                        <button id="signupBtn">Create Account</button>
                    </div>
                </div>
            `;
            document.getElementById("signupBtn").onclick = handleSignup;
            document.getElementById("backToLogin").onclick = () => renderAuth();
        };
    }
    
    // Restore session
    (function init() {
        const stored = localStorage.getItem("hilom_user");
        if (stored) {
            try {
                const userData = JSON.parse(stored);
                db.collection("users").doc(userData.username).get().then(doc => {
                    if (doc.exists) {
                        currentUser = { username: doc.data().username, isAdmin: doc.data().isAdmin || false };
                        updatePresence().then(() => renderUserListDashboard());
                    } else { localStorage.removeItem("hilom_user"); renderAuth(); }
                }).catch(() => renderAuth());
            } catch(e) { renderAuth(); }
        } else { renderAuth(); }
    })();
</script>
</body>
