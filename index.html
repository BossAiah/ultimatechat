<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Chat</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; }
        .active { display: flex; }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { background: #0084ff; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; }
        #msg-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 16px; }
        .sent { align-self: flex-end; background: #0084ff; }
        .received { align-self: flex-start; background: #333; }
        .user-btn { background: #222; margin: 5px 0; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h2 style="text-align:center">Circle Chat</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="initialize()" style="background:#111; margin-top:50px; font-size:10px;">Setup Users Once</button>
    </div>

    <div id="main-screen" class="screen">
        <h3>Contacts</h3>
        <div id="contact-list" style="display:flex; flex-direction:column"></div>
        <button onclick="location.reload()" style="background:red; margin-top:auto">Logout</button>
    </div>

    <div id="chat-screen" class="screen">
        <button onclick="showScreen('main-screen')">Back</button>
        <div id="msg-list"></div>
        <div style="display:flex; gap:5px">
            <input type="text" id="msg-input" style="flex:1" placeholder="Type...">
            <button onclick="send()">Send</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyA44XF2mdWb5LWxd9aoHcZjvaIIR3kFOGM",
        authDomain: "newchat-5365d.firebaseapp.com",
        projectId: "newchat-5365d",
        databaseURL: "https://newchat-5365d-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "newchat-5365d.firebasestorage.app",
        appId: "1:1060702317444:web:54ca79a822817bd9674bd1"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let me = null;
    let targetId = null;
    const allowed = { 'admin': '1818', 'user27': '1704', 'sarina': '1704' };

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.initialize = async () => {
        for (let u in allowed) {
            try {
                await createUserWithEmailAndPassword(auth, `${u}@circle.com`, allowed[u]);
            } catch (e) {}
        }
        alert("Ready!");
    };

    window.login = async () => {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (!allowed[u]) return alert("Access Denied");
        
        try {
            const res = await signInWithEmailAndPassword(auth, `${u}@circle.com`, p);
            me = { uid: res.user.uid, name: u };
            loadContacts();
            showScreen('main-screen');
        } catch (e) { alert("Wrong Password"); }
    };

    function loadContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        ['admin', 'user27', 'sarina'].forEach(u => {
            if (u === me.name) return;
            const b = document.createElement('button');
            b.className = 'user-btn';
            b.innerText = u;
            b.onclick = () => startChat(u);
            list.appendChild(b);
        });
    }

    function startChat(u) {
        targetId = u;
        const chatId = me.name < u ? `${me.name}_${u}` : `${u}_${me.name}`;
        showScreen('chat-screen');
        onValue(ref(db, 'chats/' + chatId), (snap) => {
            const cont = document.getElementById('msg-list');
            cont.innerHTML = '';
            snap.forEach(m => {
                const data = m.val();
                const div = document.createElement('div');
                div.className = `msg ${data.sender === me.name ? 'sent' : 'received'}`;
                div.innerText = data.text;
                cont.appendChild(div);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    window.send = () => {
        const i = document.getElementById('msg-input');
        const chatId = me.name < targetId ? `${me.name}_${targetId}` : `${targetId}_${me.name}`;
        if (i.value) {
            push(ref(db, 'chats/' + chatId), { text: i.value, sender: me.name, time: serverTimestamp() });
            i.value = '';
        }
    };
</script>
</body>
</html>
