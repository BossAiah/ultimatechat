<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

#login, #chat, #admin {
  display: none;
  height: 100vh;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #1f1f1f;
  color: white;
}

#messages {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 60%;
}

.me {
  background: #2563eb;
  margin-left: auto;
}

.other {
  background: #333;
}

#inputArea {
  display: flex;
}

#inputArea input {
  flex: 1;
}

.topbar {
  padding: 10px;
  background: #111;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h1>Circle Chat</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="topbar">
    <span id="userLabel"></span>
    <button onclick="openAdmin()">Admin</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type message... 😊">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="center">
  <h2>Admin Panel</h2>

  <input id="newUser1" placeholder="User 1 name">
  <input id="newUser2" placeholder="User 2 name">
  <input id="newPass" placeholder="New Password">

  <button onclick="saveAdmin()">Save Changes</button>
  <button onclick="backChat()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCBFQ44up8oGRleBbT7GACOLY9zZsraAc",
  authDomain: "circle-chat-a2e81.firebaseapp.com",
  projectId: "circle-chat-a2e81",
  storageBucket: "circle-chat-a2e81.firebasestorage.app",
  messagingSenderId: "975339459589",
  appId: "1:975339459589:web:6f4ced5e6f38d87d91b86c",
  measurementId: "G-0SKZS9MCD1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DEFAULT USERS (stored locally first time)
if (!localStorage.getItem("users")) {
  localStorage.setItem("users", JSON.stringify({
    u1: "User27",
    u2: "User09",
    pass: "thewayyou"
  }));
}

let currentUser = "";

// LOGIN
window.login = function() {
  let u = username.value;
  let p = password.value;
  let data = JSON.parse(localStorage.getItem("users"));

  if ((u === data.u1 || u === data.u2) && p === data.pass) {
    currentUser = u;
    login.style.display = "none";
    chat.style.display = "block";
    userLabel.innerText = u;
    loadMessages();
  } else {
    alert("Invalid login");
  }
}

// SEND MESSAGE
window.sendMsg = async function() {
  if (!msgInput.value) return;

  await addDoc(collection(db, "messages"), {
    text: msgInput.value,
    user: currentUser,
    time: Date.now()
  });

  msgInput.value = "";
}

// LOAD REALTIME
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, snapshot => {
    messages.innerHTML = "";

    snapshot.forEach(docSnap => {
      let d = docSnap.data();

      // AUTO DELETE after 2 mins
      if (Date.now() - d.time > 120000) {
        deleteDoc(doc(db, "messages", docSnap.id));
        return;
      }

      let div = document.createElement("div");
      div.className = "msg " + (d.user === currentUser ? "me" : "other");
      div.innerText = d.text;

      messages.appendChild(div);
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

// ADMIN
window.openAdmin = function() {
  admin.style.display = "flex";
  chat.style.display = "none";

  let data = JSON.parse(localStorage.getItem("users"));
  newUser1.value = data.u1;
  newUser2.value = data.u2;
}

window.backChat = function() {
  admin.style.display = "none";
  chat.style.display = "block";
}

window.saveAdmin = function() {
  localStorage.setItem("users", JSON.stringify({
    u1: newUser1.value,
    u2: newUser2.value,
    pass: newPass.value
  }));

  alert("Updated!");
}

login.style.display = "flex";
</script>

</body>
</html>
