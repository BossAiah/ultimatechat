<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; padding: 15px; }
        .bubble { max-width: 75%; padding: 12px 16px; margin-bottom: 10px; font-size: 16px; line-height: 1.4; word-wrap: break-word; transition: opacity 0.3s ease; }
        .sent { background-color: #0044cc; color: #ffffff; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .received { background-color: #333333; color: #e0e0e0; align-self: flex-start; border-radius: 20px 20px 20px 4px; }
        .hidden { display: none; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #121212; padding: 15px; border-top: 1px solid #222; z-index: 20; }
        input, button { outline: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen px-6">
        <div class="w-full max-w-sm bg-[#111] p-8 rounded-3xl border border-gray-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <span class="text-2xl font-bold">C</span>
                </div>
                <h1 class="text-2xl font-bold text-white">Circle Chat</h1>
            </div>
            <input type="text" id="username" placeholder="Username" class="w-full p-4 mb-3 rounded-2xl bg-[#222] text-white border border-gray-700">
            <input type="password" id="password" placeholder="Key" class="w-full p-4 mb-6 rounded-2xl bg-[#222] text-white border border-gray-700">
            <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition">Login</button>
            <p id="login-error" class="text-red-500 text-center mt-4 hidden">Invalid Credentials</p>
        </div>
    </div>

    <div id="chat-screen" class="hidden flex flex-col h-screen">
        <header class="p-4 bg-[#111] border-b border-gray-800 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="font-bold text-blue-500">Circle Chat</h2>
                <p id="display-user" class="text-[10px] text-gray-500 uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="showAdmin()" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full">Admin</button>
                <button onclick="logout()" class="text-[10px] bg-red-900/30 text-red-500 px-3 py-1 rounded-full">Logout</button>
            </div>
        </header>

        <div id="messages" class="chat-container"></div>

        <div class="input-area flex gap-2 items-center">
            <input type="text" id="msg-input" placeholder="Type message..." class="flex-1 p-3 px-5 rounded-full bg-[#222] text-white border-none text-base">
            <button onclick="sendMessage()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center active:scale-90 transition">
                <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111] p-6 rounded-3xl w-full max-w-xs border border-gray-800">
            <h3 class="font-bold mb-4">Admin Controls</h3>
            <input type="number" id="admin-user-idx" class="w-full p-3 mb-2 rounded-xl bg-[#222]" placeholder="User Index (0 or 1)">
            <input type="text" id="new-username" class="w-full p-3 mb-2 rounded-xl bg-[#222]" placeholder="New Name">
            <input type="text" id="new-pass" class="w-full p-3 mb-4 rounded-xl bg-[#222]" placeholder="New Password">
            <button onclick="applyAdminChanges()" class="w-full bg-green-600 p-3 rounded-xl mb-2 font-bold">Save Changes</button>
            <button onclick="hideAdmin()" class="w-full bg-gray-700 p-3 rounded-xl font-bold">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCBFQ44up8oGRleBbT7GACOLY9zZsraAc",
            authDomain: "circle-chat-a2e81.firebaseapp.com",
            projectId: "circle-chat-a2e81",
            storageBucket: "circle-chat-a2e81.firebasestorage.app",
            messagingSenderId: "975339459589",
            appId: "1:975339459589:web:6f4ced5e6f38d87d91b86c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'chat_room');

        // Restore login and user profiles from localStorage
        let currentUser = localStorage.getItem('circleChatUser') || null;
        let users = JSON.parse(localStorage.getItem('circleChatProfiles')) || [
            { name: "User27", pass: "thewayyou" },
            { name: "User 09", pass: "thewayyou" }
        ];

        // Check for session on startup
        if (currentUser) {
            window.addEventListener('DOMContentLoaded', showChat);
        }

        window.login = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const found = users.find(user => user.name === u && user.pass === p);

            if (found) {
                currentUser = found.name;
                localStorage.setItem('circleChatUser', currentUser);
                showChat();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        window.logout = () => {
            localStorage.removeItem('circleChatUser');
            location.reload();
        };

        function showChat() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('display-user').innerText = `Active: ${currentUser}`;
            startRealtimeSync();
        }

        function startRealtimeSync() {
            // Instant Message Listener
            onChildAdded(chatRef, (snapshot) => {
                renderMessage(snapshot.key, snapshot.val());
            });

            // Instant Delete Listener (For the 2-minute rule)
            onChildRemoved(chatRef, (snapshot) => {
                const el = document.getElementById(`msg-${snapshot.key}`);
                if (el) {
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                }
            });

            // Background Cleanup Task (Checks every 15 seconds)
            setInterval(cleanupExpiredMessages, 15000);
        }

        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            push(chatRef, {
                sender: currentUser,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        };

        function renderMessage(id, msg) {
            const container = document.getElementById('messages');
            if (document.getElementById(`msg-${id}`)) return;

            const isMe = msg.sender === currentUser;
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `bubble ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">${msg.sender}</div>
                <div>${msg.text}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function cleanupExpiredMessages() {
            const twoMinutesInMs = 2 * 60 * 1000;
            const cutoff = Date.now() - twoMinutesInMs;
            
            onValue(chatRef, (snapshot) => {
                snapshot.forEach((child) => {
                    if (child.val().time < cutoff) {
                        remove(ref(db, `chat_room/${child.key}`));
                    }
                });
            }, { onlyOnce: true });
        }

        // Admin functionality
        window.showAdmin = () => document.getElementById('admin-modal').classList.remove('hidden');
        window.hideAdmin = () => document.getElementById('admin-modal').classList.add('hidden');
        window.applyAdminChanges = () => {
            const i = document.getElementById('admin-user-idx').value;
            const n = document.getElementById('new-username').value;
            const p = document.getElementById('new-pass').value;
            if(users[i]) {
                if(n) users[i].name = n;
                if(p) users[i].pass = p;
                localStorage.setItem('circleChatProfiles', JSON.stringify(users));
                alert("Updated. New login credentials saved.");
                hideAdmin();
            }
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
