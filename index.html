<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Inter', sans-serif; }
        .chat-bubble { max-width: 80%; border-radius: 18px; padding: 10px 15px; margin-bottom: 8px; }
        .sent { background-color: #0084ff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background-color: #242526; align-self: flex-start; border-bottom-left-radius: 4px; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3a3b3c; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="login-screen" class="flex flex-col items-center justify-center h-full space-y-4">
        <h1 class="text-3xl font-bold text-white mb-6">Circle Chat</h1>
        <div class="bg-[#242526] p-8 rounded-xl shadow-xl w-80">
            <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-4 rounded bg-[#3a3b3c] border-none text-white focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Key" class="w-full p-3 mb-6 rounded bg-[#3a3b3c] border-none text-white focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Enter Room</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden text-center">Invalid credentials.</p>
        </div>
    </div>

    <div id="chat-screen" class="hidden flex flex-col h-full">
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#1c1e21]">
            <h2 class="font-bold text-lg text-blue-400">● Circle Chat</h2>
            <div class="flex gap-4">
                <button onclick="showAdmin()" class="text-xs text-gray-500 hover:text-white">Admin</button>
                <button onclick="location.reload()" class="text-xs text-red-500">Logout</button>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>

        <div class="p-4 bg-[#1c1e21] border-t border-gray-800">
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 p-3 rounded-full bg-[#3a3b3c] border-none text-white focus:outline-none">
                <button onclick="sendMessage()" class="bg-blue-600 p-3 rounded-full px-6 hover:bg-blue-700 transition">Send</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4">
        <div class="bg-[#242526] p-6 rounded-xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Admin Control</h3>
            <label class="text-sm text-gray-400">Target User (0 or 1)</label>
            <input type="number" id="admin-user-idx" class="w-full p-2 mb-4 rounded bg-[#3a3b3c] text-white" placeholder="0 or 1">
            <input type="text" id="new-username" class="w-full p-2 mb-4 rounded bg-[#3a3b3c] text-white" placeholder="New Username">
            <input type="text" id="new-pass" class="w-full p-2 mb-4 rounded bg-[#3a3b3c] text-white" placeholder="New Password">
            <div class="flex gap-2">
                <button onclick="applyAdminChanges()" class="flex-1 bg-green-600 p-2 rounded">Save</button>
                <button onclick="hideAdmin()" class="flex-1 bg-gray-600 p-2 rounded">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp, remove, query, orderByChild, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCBFQ44up8oGRleBbT7GACOLY9zZsraAc",
            authDomain: "circle-chat-a2e81.firebaseapp.com",
            projectId: "circle-chat-a2e81",
            storageBucket: "circle-chat-a2e81.firebasestorage.app",
            messagingSenderId: "975339459589",
            appId: "1:975339459589:web:6f4ced5e6f38d87d91b86c",
            measurementId: "G-0SKZS9MCD1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'messages');

        // Local State
        let currentUser = null;
        let users = [
            { name: "User27", pass: "thewayyou" },
            { name: "User 09", pass: "thewayyou" }
        ];

        // Login Logic
        window.login = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const found = users.find(user => user.name === u && user.pass === p);

            if (found) {
                currentUser = found.name;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                initChat();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        // Chat Logic
        function initChat() {
            onChildAdded(chatRef, (data) => {
                const msg = data.val();
                displayMessage(msg);
            });

            // Auto-cleanup Loop (Runs every 30 seconds)
            setInterval(cleanupMessages, 30000);
        }

        window.sendMessage = () => {
            const text = document.getElementById('msg-input').value;
            if (!text.trim()) return;

            push(chatRef, {
                sender: currentUser,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('msg-input').value = '';
        };

        function displayMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const isMe = msg.sender === currentUser;
            
            div.className = `chat-bubble ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<div class="text-xs opacity-50 mb-1">${msg.sender}</div><div>${msg.text}</div>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function cleanupMessages() {
            const twoMinutesAgo = Date.now() - (2 * 60 * 1000);
            onValue(chatRef, (snapshot) => {
                snapshot.forEach((childSnapshot) => {
                    if (childSnapshot.val().timestamp < twoMinutesAgo) {
                        remove(ref(db, `messages/${childSnapshot.key}`));
                        location.reload(); // Refresh to clear UI
                    }
                });
            }, { onlyOnce: true });
        }

        // Admin Logic
        window.showAdmin = () => document.getElementById('admin-modal').classList.remove('hidden');
        window.hideAdmin = () => document.getElementById('admin-modal').classList.add('hidden');
        
        window.applyAdminChanges = () => {
            const idx = document.getElementById('admin-user-idx').value;
            const newName = document.getElementById('new-username').value;
            const newPass = document.getElementById('new-pass').value;

            if(users[idx]) {
                if(newName) users[idx].name = newName;
                if(newPass) users[idx].pass = newPass;
                alert("Settings Updated locally for this session.");
                hideAdmin();
            }
        };

        // Enter key support
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
